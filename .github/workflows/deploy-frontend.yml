name: Deploy Frontend to Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'UpayClient/_KC/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署環境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify source files
        run: |
          echo "=== 檢查源碼文件 ==="
          ls -la UpayClient/_KC/
          echo ""
          echo "=== API_BASE 配置 ==="
          grep -n "API_BASE" UpayClient/_KC/index.html || echo "未找到 API_BASE"

      - name: Create _headers for CORS
        run: |
          cat > UpayClient/_KC/_headers << 'EOF'
          /*
            Access-Control-Allow-Origin: *
            Access-Control-Allow-Methods: GET, POST, PUT, DELETE, OPTIONS
            Access-Control-Allow-Headers: Content-Type, Authorization, X-API-Key
          EOF
          echo "✅ CORS headers 已創建"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: upay-client-kc
          directory: UpayClient/_KC
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Deployment
        run: |
          echo "=== 部署完成 ==="
          echo "前端網址: https://upay-client-kc.pages.dev"
          echo ""
          echo "⚠️  重要提醒:"
          echo "1. 請確認 Worker (payment-api) 已正確部署"
          echo "2. 請驗證 API endpoint 可正常訪問"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ 部署失敗！請檢查:"
          echo "1. CLOUDFLARE_API_TOKEN 是否正確設置"
          echo "2. upay-client-kc 項目是否已在 Cloudflare Dashboard 創建"
