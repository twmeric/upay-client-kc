name: CI Check

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  check-frontend:
    runs-on: ubuntu-latest
    name: Check Frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Check HTML Syntax
        run: |
          echo "=== 檢查前端文件 ==="
          
          # 檢查 index.html
          if [ -f "UpayClient/_KC/index.html" ]; then
            echo "✅ index.html 存在"
            
            # 檢查 API_BASE 配置
            API_BASE=$(grep -o "const API_BASE = '[^']*'" UpayClient/_KC/index.html | grep -o "'[^']*'" | tr -d "'")
            echo "📝 API_BASE: $API_BASE"
            
            if echo "$API_BASE" | grep -q "workers.dev"; then
              echo "✅ API_BASE 指向 Workers 域名"
            else
              echo "⚠️  API_BASE 可能不是 Workers 域名，請確認"
            fi
          else
            echo "❌ index.html 不存在"
            exit 1
          fi

  check-backend:
    runs-on: ubuntu-latest
    name: Check Backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Worker Files
        run: |
          echo "=== 檢查 Worker 文件 ==="
          
          if [ -f "payment-worker/src/index.js" ]; then
            echo "✅ Worker index.js 存在"
          else
            echo "❌ Worker index.js 不存在"
            exit 1
          fi
          
          if [ -f "payment-worker/wrangler.toml" ]; then
            echo "✅ wrangler.toml 存在"
            
            # 檢查配置
            WORKER_NAME=$(grep "^name =" payment-worker/wrangler.toml | cut -d'"' -f2)
            echo "📝 Worker 名稱: $WORKER_NAME"
          else
            echo "❌ wrangler.toml 不存在"
            exit 1
          fi
          
          if [ -f "payment-worker/schema.sql" ]; then
            echo "✅ schema.sql 存在"
          else
            echo "⚠️  schema.sql 不存在"
          fi

  test-api-connectivity:
    runs-on: ubuntu-latest
    name: Test API Connectivity
    needs: [check-backend]
    steps:
      - name: Test Worker Endpoint
        run: |
          echo "=== 測試 API 連通性 ==="
          
          WORKER_URL="https://payment-api.jimsbond007.workers.dev"
          
          # 測試健康檢查
          echo "測試 $WORKER_URL/health ..."
          curl -s -o /dev/null -w "Health Check: HTTP %{http_code}\n" "$WORKER_URL/health" || echo "無法連接"
          
          # 測試 API 端點
          echo "測試 $WORKER_URL/api/v1/client/KC ..."
          curl -s -o /dev/null -w "API Endpoint: HTTP %{http_code}\n" "$WORKER_URL/api/v1/client/KC" || echo "無法連接"
