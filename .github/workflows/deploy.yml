name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    name: Deploy Frontend to Pages
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd UpayClient/_KC
          wrangler pages deploy . --project-name=upay-client-kc --branch=main --commit-dirty=true

      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Frontend deployed successfully!"
            echo "URL: https://upay-client-kc.pages.dev"
          else
            echo "❌ Frontend deployment failed"
            echo "Please check:"
            echo "1. CLOUDFLARE_API_TOKEN is set in Repository secrets"
            echo "2. CLOUDFLARE_ACCOUNT_ID is set in Repository secrets"
            echo "3. upay-client-kc project exists in Cloudflare Pages"
          fi
