name: Deploy King-Chicken v2 to Production

on:
  push:
    branches: [production]
    paths:
      - 'clients/kingchicken/**'
      - 'apps/worker/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    name: 🚀 Deploy Worker to Production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Deploy Worker to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy --env=production

  deploy-admin-panel:
    runs-on: ubuntu-latest
    name: 🌐 Deploy Admin Panel to Production
    needs: deploy-worker
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: clients/kingchicken
          command: pages deploy . --project-name=easylink-client-kingchicken
      
      - name: Deployment Summary
        run: |
          echo "✅ Production Deployment completed!"
          echo "🔗 Production URLs:"
          echo "   - Admin Panel: https://easylink-client-kingchicken.pages.dev/admin.html"
          echo "   - Drivers Page: https://easylink-client-kingchicken.pages.dev/drivers.html"
          echo "   - Custom Domain: https://king-chicken.jkdcoding.com/admin.html"
