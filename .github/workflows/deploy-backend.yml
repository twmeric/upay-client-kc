name: Deploy Backend to Workers

on:
  push:
    branches: [main, master]
    paths:
      - 'payment-worker/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      deploy_d1:
        description: '同時執行數據庫遷移'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'
  WORKER_NAME: payment-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker & D1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Verify Worker Configuration
        run: |
          echo "=== Worker 配置檢查 ==="
          cd payment-worker
          echo "Worker 名稱: $(grep "^name =" wrangler.toml | cut -d'"' -f2)"
          echo "D1 數據庫: $(grep "database_name" wrangler.toml | cut -d'"' -f2)"
          echo ""
          echo "=== 檢查 Secrets 配置 ==="
          if grep -q "SECRET" wrangler.toml 2>/dev/null; then
            echo "⚠️  發現硬編碼 Secrets，請使用 wrangler secret put 設置"
          else
            echo "✅ Secrets 配置正確"
          fi

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd payment-worker
          echo "🚀 開始部署 Worker..."
          wrangler deploy --config wrangler.toml

      - name: Check Worker Health
        run: |
          echo "=== 檢查 Worker 健康狀態 ==="
          WORKER_URL="https://payment-api.jimsbond007.workers.dev"
          
          # 等待 Worker 啟動
          sleep 5
          
          # 測試健康檢查端點
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/health" 2>/dev/null || echo "000")
          
          if [ "$HEALTH_STATUS" = "200" ]; then
            echo "✅ Worker 健康檢查通過 (HTTP 200)"
          else
            echo "⚠️  Worker 健康檢查返回 HTTP $HEALTH_STATUS"
            echo "   Worker URL: $WORKER_URL"
          fi

      - name: D1 Database Migration (Optional)
        if: github.event.inputs.deploy_d1 == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd payment-worker
          echo "🗄️  執行 D1 數據庫遷移..."
          
          # 檢查是否有新的 migration 文件
          if [ -f "schema-upgrade.sql" ]; then
            echo "發現 schema-upgrade.sql，執行遷移..."
            wrangler d1 execute payment-db --file=./schema-upgrade.sql --remote || echo "⚠️  遷移可能已執行過"
          fi
          
          echo "✅ D1 遷移完成"

      - name: Output Deployment Info
        run: |
          echo ""
          echo "========================================"
          echo "  🎉 Backend 部署完成!"
          echo "========================================"
          echo ""
          echo "Worker URL:"
          echo "  https://payment-api.dfbee5c2a5706a81bc04675499c933d4.workers.dev"
          echo ""
          echo "API Endpoints:"
          echo "  POST /api/v1/payments"
          echo "  GET  /api/v1/payments/:id"
          echo "  POST /api/v1/client/:clientCode/*"
          echo ""
          echo "⚠️  請確保前端 API_BASE 指向正確的 Worker URL"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Worker 部署失敗！請檢查:"
          echo "1. CLOUDFLARE_API_TOKEN 是否具有 Workers 部署權限"
          echo "2. payment-api Worker 名稱是否可用"
          echo "3. D1 數據庫 payment-db 是否已創建"
