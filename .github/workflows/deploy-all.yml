name: Deploy All (Frontend + Backend)

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: '部署後端 (Worker)'
        required: true
        default: true
        type: boolean
      deploy_frontend:
        description: '部署前端 (Pages)'
        required: true
        default: true
        type: boolean
      environment:
        description: '部署環境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy-backend:
    if: github.event.inputs.deploy_backend == 'true'
    runs-on: ubuntu-latest
    name: Deploy Backend
    outputs:
      worker_url: ${{ steps.deploy.outputs.worker_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g wrangler@3
      
      - name: Deploy Worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd payment-worker
          wrangler deploy --config wrangler.toml
          echo "worker_url=https://payment-api.dfbee5c2a5706a81bc04675499c933d4.workers.dev" >> $GITHUB_OUTPUT

  deploy-frontend:
    if: github.event.inputs.deploy_frontend == 'true'
    runs-on: ubuntu-latest
    name: Deploy Frontend
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Update API_BASE
        run: |
          WORKER_URL="https://payment-api.jimsbond007.workers.dev"
          
          # 更新 index.html 中的 API_BASE
          sed -i "s|const API_BASE = '.*';|const API_BASE = '${WORKER_URL}/api/v1/client/KC';|g" UpayClient/_KC/index.html
          sed -i "s|const API_BASE = '.*';|const API_BASE = '${WORKER_URL}/api/v1/client/KC';|g" UpayClient/_KC/admin.html
          
          echo "✅ API_BASE 已更新為: ${WORKER_URL}/api/v1/client/KC"
          grep "API_BASE" UpayClient/_KC/index.html

      - name: Deploy to Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: upay-client-kc
          directory: UpayClient/_KC

  notify:
    runs-on: ubuntu-latest
    name: Notify Completion
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "========================================"
          echo "  🚀 部署完成報告"
          echo "========================================"
          echo ""
          echo "前端: https://upay-client-kc.pages.dev"
          echo "後端: https://payment-api.dfbee5c2a5706a81bc04675499c933d4.workers.dev"
          echo ""
          echo "✅ CI/CD 自動化已啟動！"
