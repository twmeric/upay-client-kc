<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King-Chicken</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FAF8F5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #FF6B00, #E55A00);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 3rem;
            color: white;
            font-weight: bold;
        }
        h1 {
            color: #1A1A1A;
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        p {
            color: #4A4A4A;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #FF6B00, #E55A00);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,107,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🐔</div>
        <h1>King-Chicken</h1>
        <p>安全便捷的支付服务</p>
        <a href="/payment" class="btn">立即支付</a>
    </div>
</body>
</html>
