<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King-Chicken 管理後台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FAF8F5;
            min-height: 100vh;
        }
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        h1 {
            color: #1A1A1A;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E8E4E0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #FF6B00;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF6B00, #E55A00);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .dashboard {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-logo {
            width: 48px;
            height: 48px;
        }
        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .header-title h2 {
            color: #1A1A1A;
            font-size: 20px;
        }
        .header-title p {
            color: #666;
            font-size: 14px;
        }
        .logout-btn {
            width: auto;
            padding: 10px 24px;
            font-size: 14px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .stat-value {
            color: #1A1A1A;
            font-size: 32px;
            font-weight: 700;
        }
        .stat-change {
            color: #10B981;
            font-size: 14px;
            margin-top: 4px;
        }
        .content-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .content-card h3 {
            color: #1A1A1A;
            margin-bottom: 20px;
            font-size: 18px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #E8E4E0;
        }
        th {
            color: #666;
            font-weight: 500;
            font-size: 14px;
        }
        td {
            color: #333;
            font-size: 14px;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-success {
            background: #D1FAE5;
            color: #059669;
        }
        .status-pending {
            background: #FEF3C7;
            color: #D97706;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-page" id="loginPage">
        <div class="login-box">
            <div class="logo"><img src="logo.png" alt="King-Chicken Logo"></div>
            <h1>King-Chicken</h1>
            <p class="subtitle">商戶管理後台</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>用戶名</label>
                    <input type="text" id="username" placeholder="請輸入用戶名" required>
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="password" placeholder="請輸入密碼" required>
                </div>
                <button type="submit">登入</button>
            </form>
        </div>
    </div>

    <!-- 管理面板 -->
    <div class="dashboard" id="dashboard">
        <div class="header">
            <div class="header-left">
                <div class="header-logo"><img src="logo.png" alt="King-Chicken Logo"></div>
                <div class="header-title">
                    <h2>King-Chicken</h2>
                    <p>商戶管理後台</p>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">登出</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>今日交易額</h3>
                <div class="stat-value">HK$ 12,580</div>
                <div class="stat-change">+15% 較昨日</div>
            </div>
            <div class="stat-card">
                <h3>今日訂單數</h3>
                <div class="stat-value">48</div>
                <div class="stat-change">+8% 較昨日</div>
            </div>
            <div class="stat-card">
                <h3>成功率</h3>
                <div class="stat-value">96.5%</div>
                <div class="stat-change">+2% 較昨日</div>
            </div>
            <div class="stat-card">
                <h3>待處理訂單</h3>
                <div class="stat-value">3</div>
                <div class="stat-change">需關注</div>
            </div>
        </div>

        <div class="content-card">
            <h3>最近交易</h3>
            <table>
                <thead>
                    <tr>
                        <th>訂單號</th>
                        <th>時間</th>
                        <th>金額</th>
                        <th>支付方式</th>
                        <th>狀態</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>ORD20260320001</td>
                        <td>2026-03-20 14:30</td>
                        <td>HK$ 1,000</td>
                        <td>銀聯在線</td>
                        <td><span class="status-badge status-success">成功</span></td>
                    </tr>
                    <tr>
                        <td>ORD20260320002</td>
                        <td>2026-03-20 14:25</td>
                        <td>HK$ 500</td>
                        <td>支付寶</td>
                        <td><span class="status-badge status-success">成功</span></td>
                    </tr>
                    <tr>
                        <td>ORD20260320003</td>
                        <td>2026-03-20 14:20</td>
                        <td>HK$ 2,000</td>
                        <td>微信支付</td>
                        <td><span class="status-badge status-pending">處理中</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 检查是否已登录
        if (localStorage.getItem('kc_admin_logged_in')) {
            showDashboard();
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 验证用户名和密码
            const validUsers = [
                { username: 'admin', password: 'kingchicken123' },
                { username: 'mimichu', password: '98113210' }
            ];
            
            const isValid = validUsers.some(user => 
                user.username === username && user.password === password
            );
            
            if (isValid) {
                localStorage.setItem('kc_admin_logged_in', 'true');
                localStorage.setItem('kc_admin_user', username);
                showDashboard();
            } else {
                alert('用戶名或密碼錯誤');
            }
        });

        function showDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        function logout() {
            localStorage.removeItem('kc_admin_logged_in');
            location.reload();
        }
    </script>
</body>
</html>
