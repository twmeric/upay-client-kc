<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King-Chicken 管理後台</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --hermes-orange: #FF6B00;
            --hermes-dark: #E55A00;
            --cream: #FAF7F2;
            --cream-dark: #F5F0E8;
            --beige: #EDE8E0;
            --text-dark: #2C2419;
            --text-medium: #5C4F3D;
            --text-light: #8B7D6B;
            --white: #FFFFFF;
            --gold: #C9A961;
            --success: #16a34a;
            --warning: #d97706;
            --danger: #dc2626;
        }

        body {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            background: var(--cream);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--white) 0%, var(--cream) 100%);
            border-bottom: 1px solid var(--beige);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(44, 36, 25, 0.08);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--hermes-orange), var(--gold), var(--hermes-orange));
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand img {
            height: 48px;
            width: auto;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-dark);
            letter-spacing: 1px;
        }

        .brand-subtitle {
            font-size: 11px;
            color: var(--text-light);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: var(--cream-dark);
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-medium);
            border: 1px solid var(--beige);
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--hermes-orange), var(--hermes-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .logout-btn {
            padding: 10px 18px;
            background: transparent;
            color: var(--text-medium);
            border: 2px solid var(--beige);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        /* 統計卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--beige);
            box-shadow: 0 4px 20px rgba(44, 36, 25, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(44, 36, 25, 0.1);
        }

        .stat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .stat-icon.orange {
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.15), rgba(255, 107, 0, 0.05));
        }

        .stat-icon.gold {
            background: linear-gradient(135deg, rgba(201, 169, 97, 0.15), rgba(201, 169, 97, 0.05));
        }

        .stat-icon.green {
            background: linear-gradient(135deg, rgba(22, 163, 74, 0.15), rgba(22, 163, 74, 0.05));
        }

        .stat-icon.blue {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.15), rgba(37, 99, 235, 0.05));
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--text-dark);
            margin-top: 4px;
        }

        .stat-change {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-change.positive {
            color: var(--success);
        }

        /* 內容區塊 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .card {
            background: var(--white);
            border-radius: 16px;
            border: 1px solid var(--beige);
            box-shadow: 0 4px 20px rgba(44, 36, 25, 0.06);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--beige);
            background: linear-gradient(135deg, var(--cream) 0%, var(--white) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 3px;
            height: 18px;
            background: linear-gradient(180deg, var(--hermes-orange), var(--gold));
            border-radius: 2px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--hermes-orange), var(--hermes-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 0, 0.4);
        }

        .btn-secondary {
            background: var(--cream);
            color: var(--text-medium);
            border: 1px solid var(--beige);
        }

        .btn-secondary:hover {
            background: var(--beige);
        }

        .card-body {
            padding: 24px;
        }

        /* 表格 */
        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 14px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--cream);
            border-bottom: 2px solid var(--beige);
        }

        .data-table td {
            padding: 16px;
            font-size: 14px;
            color: var(--text-medium);
            border-bottom: 1px solid var(--beige);
        }

        .data-table tr:hover td {
            background: var(--cream);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.success {
            background: rgba(22, 163, 74, 0.1);
            color: var(--success);
        }

        .status-badge.pending {
            background: rgba(217, 119, 6, 0.1);
            color: var(--warning);
        }

        .status-badge.failed {
            background: rgba(220, 38, 38, 0.1);
            color: var(--danger);
        }

        .amount-cell {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            font-weight: 600;
            color: var(--hermes-orange);
        }

        /* 篩選器 */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-input {
            padding: 10px 14px;
            border: 1px solid var(--beige);
            border-radius: 8px;
            font-size: 14px;
            background: var(--white);
            color: var(--text-dark);
            min-width: 160px;
        }

        .filter-input:focus {
            outline: none;
            border-color: var(--hermes-orange);
            box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.08);
        }

        /* 空狀態 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 14px;
        }

        /* 響應式 */
        @media (max-width: 768px) {
            .header-content {
                padding: 12px 16px;
                flex-direction: column;
                gap: 12px;
            }

            .brand img {
                height: 36px;
            }

            .main-container {
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .stat-card {
                padding: 20px;
            }

            .card-header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .data-table {
                font-size: 13px;
            }

            .data-table th,
            .data-table td {
                padding: 12px 10px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="brand">
                <img src="logo.png" alt="King-Chicken">
                <div class="brand-text">
                    <span class="brand-name">KING-CHICKEN</span>
                    <span class="brand-subtitle">Admin Portal</span>
                </div>
            </div>
            <nav class="nav-menu" style="display: flex; gap: 8px;">
                <a href="admin.html" class="nav-link active" style="padding: 10px 20px; background: var(--hermes-orange); color: white; border-radius: 8px; text-decoration: none; font-weight: 500;">交易記錄</a>
                <a href="boss-report.html" class="nav-link" style="padding: 10px 20px; background: var(--cream-dark); color: var(--text-medium); border-radius: 8px; text-decoration: none; font-weight: 500; border: 1px solid var(--beige);">老闆摯愛</a>
            </nav>
            <div class="header-actions">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <span id="userName">Admin</span>
                </div>
                <button class="logout-btn" onclick="logout()">登出</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <!-- 統計卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon orange">💰</div>
                    <span class="stat-label">今日收入</span>
                </div>
                <div class="stat-value" id="todayRevenue">HK$ 0.00</div>
                <div class="stat-change positive">+12.5% 較昨日</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon gold">📊</div>
                    <span class="stat-label">交易筆數</span>
                </div>
                <div class="stat-value" id="todayCount">0</div>
                <div class="stat-change">今日訂單</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon green">✓</div>
                    <span class="stat-label">成功率</span>
                </div>
                <div class="stat-value" id="successRate">98.5%</div>
                <div class="stat-change positive">過去30天</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon blue">⏱</div>
                    <span class="stat-label">平均處理</span>
                </div>
                <div class="stat-value">1.2s</div>
                <div class="stat-change">支付響應時間</div>
            </div>
        </div>

        <!-- 交易記錄 -->
        <div class="content-grid">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">交易記錄</div>
                    <div class="card-actions">
                        <button class="btn btn-secondary" onclick="refreshData()">🔄 刷新</button>
                        <button class="btn btn-primary" onclick="exportXLSX()">📥 導出 Excel</button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="filter-bar">
                        <input type="date" class="filter-input" id="startDate" placeholder="開始日期">
                        <input type="date" class="filter-input" id="endDate" placeholder="結束日期">
                        <select class="filter-input" id="statusFilter">
                            <option value="">全部狀態</option>
                            <option value="success">成功</option>
                            <option value="pending">處理中</option>
                            <option value="failed">失敗</option>
                        </select>
                        <select class="filter-input" id="payTypeFilter">
                            <option value="">全部支付方式</option>
                            <option value="UP_OP">銀聯</option>
                            <option value="ALI_H5">支付寶</option>
                            <option value="WX_H5">微信</option>
                        </select>
                        <input type="text" class="filter-input" placeholder="搜索訂單號..." id="searchInput">
                        <input type="text" class="filter-input" placeholder="搜索支付訂單號(P開頭)..." id="payOrderIdInput">
                    </div>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>時間</th>
                                    <th>訂單號</th>
                                    <th>支付訂單號</th>
                                    <th>支付方式</th>
                                    <th>金額</th>
                                    <th>狀態</th>
                                    <th>備註 (點擊編輯)</th>
                                </tr>
                            </thead>
                            <tbody id="transactionTable">
                                <!-- 數據將由 JavaScript 動態填充 -->
                            </tbody>
                        </table>
                    </div>
                    <div id="emptyState" class="empty-state" style="display: none;">
                        <div class="empty-icon">📋</div>
                        <div class="empty-text">暫無交易記錄</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'https://payment-api.jimsbond007.workers.dev/api/v1/client/KC';

        // 檢查登入狀態
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'login.html';
        }

        // 顯示用戶信息
        const user = JSON.parse(localStorage.getItem('adminUser') || '{}');
        if (user) {
            document.getElementById('userName').textContent = user.username || 'Admin';
            document.getElementById('userAvatar').textContent = (user.username || 'A')[0].toUpperCase();
        }

        // 頁面加載時獲取數據
        document.addEventListener('DOMContentLoaded', function() {
            loadTransactions();
            loadStats();
            
            // 設置默認日期
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('endDate').value = today;
            const lastWeek = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            document.getElementById('startDate').value = lastWeek;
            
            // 綁定篩選事件
            document.getElementById('startDate').addEventListener('change', filterTransactions);
            document.getElementById('endDate').addEventListener('change', filterTransactions);
            document.getElementById('statusFilter').addEventListener('change', filterTransactions);
            document.getElementById('payTypeFilter').addEventListener('change', filterTransactions);
            document.getElementById('payOrderIdInput').addEventListener('input', debounce(filterTransactions, 300));
            document.getElementById('searchInput').addEventListener('input', debounce(filterTransactions, 300));
        });

        // 防抖函數
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 篩選交易
        let allTransactions = [];
        
        async function filterTransactions() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const status = document.getElementById('statusFilter').value;
            const payType = document.getElementById('payTypeFilter').value;
                const payOrderIdSearch = document.getElementById('payOrderIdInput').value.toLowerCase();
                const search = document.getElementById('searchInput').value.toLowerCase();
            
            try {
                const response = await fetch(`${API_BASE}/admin/transactions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                let transactions = data.transactions || [];
                
                // 日期篩選
                if (startDate) {
                    const start = new Date(startDate).getTime();
                    transactions = transactions.filter(tx => new Date(tx.createdAt).getTime() >= start);
                }
                if (endDate) {
                    const end = new Date(endDate).getTime() + 86400000;
                    transactions = transactions.filter(tx => new Date(tx.createdAt).getTime() <= end);
                }
                
                // 狀態篩選
                if (status) {
                    transactions = transactions.filter(tx => tx.status === status);
                }
                
                // 支付方式篩選
                if (payType) {
                    transactions = transactions.filter(tx => tx.payType === payType);
                }
                
                // 搜索支付訂單號
                if (payOrderIdSearch) {
                    transactions = transactions.filter(tx => (tx.payOrderId || '').toLowerCase().includes(payOrderIdSearch));
                }
                
                // 搜索訂單號
                if (search) {
                    transactions = transactions.filter(tx => 
                        (tx.orderId || tx.id).toLowerCase().includes(search)
                    );
                }
                
                renderTransactions(transactions);
            } catch (error) {
                console.error('Error filtering:', error);
            }
        }

        async function loadTransactions() {
            try {
                const response = await fetch(`${API_BASE}/admin/transactions`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        logout();
                        return;
                    }
                    throw new Error('Failed to load transactions');
                }

                const data = await response.json();
                renderTransactions(data.transactions || []);
            } catch (error) {
                console.error('Error loading transactions:', error);
                // 顯示模擬數據
                renderTransactions(getMockTransactions());
            }
        }

        function renderTransactions(transactions) {
            // 重新渲染表格
            const tbody = document.getElementById('transactionTable');
            const emptyState = document.getElementById('emptyState');

            if (!transactions || transactions.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            
            const methodNames = {
                'UP_OP': '銀聯',
                'ALI_H5': '支付寶',
                'WX_H5': '微信'
            };

            tbody.innerHTML = transactions.map(tx => `
                <tr>
                    <td>${tx.orderId || tx.id}</td>
                    <td>${new Date(tx.createdAt).toLocaleString('zh-HK')}</td>
                    <td class="amount-cell">HK$ ${parseFloat(tx.amount).toFixed(2)}</td>
                    <td>${methodNames[tx.payType] || tx.payType}</td>
                    <td>
                        <span class="status-badge ${tx.status}">
                            ${getStatusText(tx.status)}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="viewDetail('${tx.id}')">
                            詳情
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusText(status) {
            const statusMap = {
                'success': '成功',
                'pending': '處理中',
                'failed': '失敗'
            };
            return statusMap[status] || status;
        }

        function getMockTransactions() {
            return [
                { id: 'ORD-001', orderId: 'ORD-001', amount: 500, payType: 'UP_OP', status: 'success', createdAt: new Date().toISOString() },
                { id: 'ORD-002', orderId: 'ORD-002', amount: 1000, payType: 'ALI_H5', status: 'success', createdAt: new Date(Date.now() - 3600000).toISOString() },
                { id: 'ORD-003', orderId: 'ORD-003', amount: 200, payType: 'WX_H5', status: 'pending', createdAt: new Date(Date.now() - 7200000).toISOString() },
            ];
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/admin/db-status`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    // 計算今日統計
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const todayStr = today.toISOString().split('T')[0];
                    
                    let todayRevenue = 0;
                    let todayCount = 0;
                    let successCount = 0;
                    
                    if (data.recentTransactions) {
                        data.recentTransactions.forEach(tx => {
                            const txDate = new Date(tx.created_at * 1000);
                            if (txDate >= today) {
                                todayCount++;
                                todayRevenue += (tx.amount / 100);
                                if (tx.status === 'paid' || tx.status === 'success') {
                                    successCount++;
                                }
                            }
                        });
                    }
                    
                    const successRate = todayCount > 0 ? ((successCount / todayCount) * 100).toFixed(1) : '0.0';
                    
                    document.getElementById('todayRevenue').textContent = `HK$ ${todayRevenue.toLocaleString('zh-HK', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                    document.getElementById('todayCount').textContent = todayCount;
                    document.getElementById('successRate').textContent = `${successRate}%`;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
                document.getElementById('todayRevenue').textContent = 'HK$ 0.00';
                document.getElementById('todayCount').textContent = '0';
                document.getElementById('successRate').textContent = '0%';
            }
        }

        function refreshData() {
            loadTransactions();
            loadStats();
        }

        async function exportXLSX() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const status = document.getElementById('statusFilter').value;
            
            let url = ${API_BASE}/admin/transactions/export;
            const params = [];
            if (startDate) params.push(startDate=);
            if (endDate) params.push(endDate=);
            if (status) params.push(status=);
            if (params.length > 0) url += '?' + params.join('&');
            
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': Bearer  }
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = 	ransactions_.xls;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(downloadUrl);
                } else {
                    alert('導出失敗');
                }
            } catch (error) {
                console.error('Export error:', error);
                alert('導出失敗');
            }
        }

        function exportData() {
            alert('導出功能開發中...');
        }

        async function checkDbStatus() {
            try {
                const response = await fetch(`${API_BASE}/admin/db-status`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                console.log('DB Status:', data);
                alert(`數據庫狀態：\n- 數據庫可用：${data.dbAvailable}\n- 交易記錄數：${data.transactionCount}\n- 客戶端：${data.clientCode}`);
            } catch (error) {
                console.error('Error checking DB status:', error);
                alert('檢查數據庫狀態失敗');
            }
        }

        async function clearAllData() {
            if (!confirm('⚠️ 警告：確定要清空所有交易數據嗎？此操作不可恢復！')) {
                return;
            }
            
            if (!confirm('再次確認：真的要刪除所有交易記錄嗎？')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/admin/clear-data`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`✅ 數據已清空！\n刪除記錄數：${data.deletedCount || 0}`);
                    refreshData();
                } else {
                    alert('❌ 清空失敗：' + data.error);
                }
            } catch (error) {
                console.error('Error clearing data:', error);
                alert('清空數據失敗：' + error.message);
            }
        }

        function viewDetail(id) {
            alert('訂單詳情：' + id);
        }

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = 'login.html';
        }
    </script>
