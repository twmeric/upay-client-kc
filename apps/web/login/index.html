<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King-Chicken - 管理後台登入</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --orange: #FF6B00;
            --orange-dark: #E55A00;
            --cream: #FAF7F2;
            --text: #2C2419;
            --text-light: #5C4F3D;
            --border: #EDE8E0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, #fff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
        }
        
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .brand-name {
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
        }
        
        .brand-subtitle {
            font-size: 13px;
            color: var(--text-light);
            letter-spacing: 2px;
            margin-top: 4px;
        }
        
        .form-title {
            font-size: 20px;
            text-align: center;
            margin-bottom: 24px;
            color: var(--text);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-label {
            display: block;
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        
        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--orange);
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,107,0,0.3);
        }
        
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        
        .back-link a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            color: var(--orange);
        }
        
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="brand">
            <div class="logo">🐔</div>
            <div class="brand-name">KING-CHICKEN</div>
            <div class="brand-subtitle">ADMIN PORTAL</div>
        </div>
        
        <div class="form-title">管理後台登入</div>
        
        <div class="error-msg" id="errorMsg"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <label class="input-label">用戶名</label>
                <input type="text" class="input-field" id="username" value="mimichu" required>
            </div>
            
            <div class="input-group">
                <label class="input-label">密碼</label>
                <input type="password" class="input-field" id="password" value="mimichu123" required>
            </div>
            
            <button type="submit" class="login-btn">登入</button>
        </form>
        
        <div class="back-link">
            <a href="../payment/">← 返回支付頁面</a>
        </div>
    </div>
    
    <script>
        // 簡單的前端認證（實際應用中應該使用 JWT 或 session）
        const VALID_USERS = {
            'mimichu': 'mimichu123',
            'admin': 'admin123'
        };
        
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (VALID_USERS[username] === password) {
                // 存儲登入狀態
                localStorage.setItem('adminToken', 'kc-token-' + Date.now());
                localStorage.setItem('adminUser', JSON.stringify({ username }));
                
                // 跳轉到管理後台
                window.location.href = '../admin/';
            } else {
                errorMsg.textContent = '用戶名或密碼錯誤';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
