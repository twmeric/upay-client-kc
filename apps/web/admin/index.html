<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #FF6B00;
            --primary-dark: #E55A00;
            --cream: #FAF7F2;
            --cream-dark: #F5F0E8;
            --beige: #EDE8E0;
            --text: #2C2419;
            --text-light: #5C4F3D;
            --success: #16a34a;
            --warning: #d97706;
            --danger: #dc2626;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', sans-serif;
            background: var(--cream);
            min-height: 100vh;
        }
        
        .header {
            background: white;
            border-bottom: 1px solid var(--beige);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-top {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .brand-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .brand-text { display: flex; flex-direction: column; }
        .brand-name { font-size: 20px; font-weight: 600; color: var(--text); }
        .brand-subtitle { font-size: 11px; color: var(--text-light); letter-spacing: 1px; }
        
        .merchant-selector {
            padding: 8px 16px;
            border: 1px solid var(--beige);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .header-nav {
            display: flex;
            gap: 8px;
        }
        
        .nav-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-light);
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .nav-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--cream-dark);
            border-radius: 20px;
            font-size: 14px;
        }
        
        .user-avatar {
            width: 28px;
            height: 28px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }
        
        .logout-btn {
            padding: 8px 16px;
            border: 1px solid var(--beige);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .logout-btn:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }
        
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .stat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .stat-icon.revenue { background: #fef3c7; }
        .stat-icon.orders { background: #dbeafe; }
        .stat-icon.success { background: #d1fae5; }
        .stat-icon.time { background: #f3e8ff; }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-light);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        
        .stat-change {
            font-size: 12px;
            color: var(--success);
        }
        
        .section-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
        }
        
        .btn-group {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 10px 16px;
            border: 1px solid var(--beige);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .btn:hover { background: var(--cream); }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--beige);
        }
        
        .filter-input {
            padding: 10px 14px;
            border: 1px solid var(--beige);
            border-radius: 8px;
            font-size: 14px;
            min-width: 140px;
        }
        
        .filter-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 12px;
            font-size: 12px;
            color: var(--text-light);
            font-weight: 500;
            background: var(--cream);
            border-bottom: 1px solid var(--beige);
        }
        
        td {
            padding: 16px 12px;
            border-bottom: 1px solid var(--beige);
            font-size: 14px;
        }
        
        tr:hover td {
            background: var(--cream);
        }
        
        .amount-cell {
            font-weight: 600;
            color: var(--text);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-badge.success {
            background: #d1fae5;
            color: var(--success);
        }
        
        .status-badge.pending {
            background: #fef3c7;
            color: var(--warning);
        }
        
        .status-badge.failed {
            background: #fee2e2;
            color: var(--danger);
        }
        
        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
        
        .remark-cell {
            max-width: 200px;
        }
        
        .remark-text {
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        
        .remark-text:hover {
            background: var(--cream-dark);
        }
        
        .remark-input {
            width: 100%;
            padding: 4px 8px;
            border: 1px solid var(--primary);
            border-radius: 4px;
            font-size: 14px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--beige);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .toast.error { background: var(--danger); }
        .toast.success { background: var(--success); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .pay-link {
            margin-top: 12px;
            padding: 12px;
            background: var(--cream);
            border-radius: 8px;
            font-size: 13px;
        }
        
        .pay-link label {
            color: var(--text-light);
            display: block;
            margin-bottom: 4px;
        }
        
        .pay-link input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--beige);
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
        }
        
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; }
            .header-nav { display: none; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    
    <header class="header">
        <div class="header-top">
            <div class="brand">
                <div class="brand-logo" id="brandLogo">🐔</div>
                <div class="brand-text">
                    <div class="brand-name" id="brandName">KING-CHICKEN</div>
                    <div class="brand-subtitle">ADMIN PORTAL</div>
                </div>
            </div>
            
            <select class="merchant-selector" id="merchantSelector">
                <option value="KC">King-Chicken (KC)</option>
            </select>
            
            <nav class="header-nav">
                <button class="nav-btn active">交易記錄</button>
                <button class="nav-btn" onclick="alert('管理層報告功能開發中')">管理層報告</button>
            </nav>
            
            <div class="user-menu">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <span id="userName">Admin</span>
                </div>
                <button class="logout-btn" onclick="logout()">登出</button>
            </div>
        </div>
    </header>
    
    <main class="main">
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon revenue">💰</div>
                    <span class="stat-label">今日收入</span>
                </div>
                <div class="stat-value" id="statRevenue">HK$ 0.00</div>
                <div class="stat-change">+0% 較昨日</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon orders">📊</div>
                    <span class="stat-label">交易筆數</span>
                </div>
                <div class="stat-value" id="statOrders">0</div>
                <div class="stat-change">今日訂單</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon success">✓</div>
                    <span class="stat-label">成功率</span>
                </div>
                <div class="stat-value" id="statSuccess">0%</div>
                <div class="stat-change">過去30天</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon time">⏱</div>
                    <span class="stat-label">平均處理</span>
                </div>
                <div class="stat-value" id="statTime">1.2s</div>
                <div class="stat-change">支付響應時間</div>
            </div>
        </div>
        
        <!-- Payment Link -->
        <div class="pay-link">
            <label>商戶支付連結 (分享給客戶):</label>
            <input type="text" id="payLink" readonly onclick="this.select()">
        </div>
        
        <br>
        
        <!-- Transactions -->
        <div class="section-card">
            <div class="section-header">
                <h2 class="section-title">交易記錄</h2>
                <div class="btn-group">
                    <button class="btn" onclick="loadData()">🔄 刷新</button>
                    <button class="btn btn-primary" onclick="exportData()">📥 導出 Excel</button>
                </div>
            </div>
            
            <div class="filters">
                <input type="date" class="filter-input" id="startDate">
                <input type="date" class="filter-input" id="endDate">
                <select class="filter-input" id="statusFilter">
                    <option value="">全部狀態</option>
                    <option value="success">成功</option>
                    <option value="pending">處理中</option>
                    <option value="failed">失敗</option>
                </select>
                <select class="filter-input" id="payTypeFilter">
                    <option value="">全部支付方式</option>
                    <option value="UP_OP">銀聯</option>
                    <option value="ALI_H5">支付寶</option>
                    <option value="WX_H5">微信</option>
                </select>
                <input type="text" class="filter-input" id="orderNoFilter" placeholder="搜索訂單號...">
                <input type="text" class="filter-input" id="payOrderIdFilter" placeholder="搜索支付訂單號(P開頭)...">
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>時間</th>
                            <th>訂單號</th>
                            <th>支付訂單號</th>
                            <th>支付方式</th>
                            <th>金額</th>
                            <th>狀態</th>
                            <th>備註 (點擊編輯)</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTable"></tbody>
                </table>
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📭</div>
                    <p>暫無交易記錄</p>
                </div>
                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>加載中...</p>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        // ============================================
        // 配置
        // ============================================
        const API_BASE = 'https://easylink-api-v2.jimsbond007.workers.dev';
        const FRONTEND_BASE = window.location.origin;
        
        // ============================================
        // 狀態
        // ============================================
        let currentMerchant = 'KC';
        
        // ============================================
        // 常量
        // ============================================
        const PAY_TYPE_NAMES = {
            'UP_OP': '銀聯',
            'ALI_H5': '支付寶',
            'WX_H5': '微信'
        };
        
        const STATUS_NAMES = {
            'success': '成功',
            'pending': '處理中',
            'failed': '失敗',
            'paid': '已支付'
        };
        
        // ============================================
        // 認證檢查
        // ============================================
        const token = localStorage.getItem('adminToken');
        const user = JSON.parse(localStorage.getItem('adminUser') || '{}');
        
        if (!token) {
            window.location.href = '../login/';
        } else {
            document.getElementById('userName').textContent = user.username || 'Admin';
            document.getElementById('userAvatar').textContent = (user.username || 'A')[0].toUpperCase();
        }
        
        // ============================================
        // 商戶選擇
        // ============================================
        const merchantSelector = document.getElementById('merchantSelector');
        merchantSelector.addEventListener('change', (e) => {
            currentMerchant = e.target.value;
            loadMerchantConfig();
            loadData();
        });
        
        // ============================================
        // 加載商戶配置
        // ============================================
        async function loadMerchantConfig() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/${currentMerchant}/`);
                const result = await response.json();
                
                if (result.success) {
                    const config = result.data;
                    document.getElementById('brandName').textContent = config.name;
                    if (config.logo) {
                        document.getElementById('brandLogo').textContent = config.logo;
                    }
                    
                    // 更新支付連結
                    const payLink = `${FRONTEND_BASE}/payment/?merchant=${currentMerchant}`;
                    document.getElementById('payLink').value = payLink;
                }
            } catch (error) {
                console.error('Failed to load merchant config:', error);
            }
        }
        
        // ============================================
        // 設置默認日期
        // ============================================
        const today = new Date().toISOString().split('T')[0];
        const lastWeek = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
        document.getElementById('endDate').value = today;
        document.getElementById('startDate').value = lastWeek;
        
        // ============================================
        // 加載統計數據
        // ============================================
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/${currentMerchant}/admin/statistics`);
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    document.getElementById('statRevenue').textContent = `HK$ ${data.todayRevenue.toLocaleString('en-HK', {minimumFractionDigits: 2})}`;
                    document.getElementById('statOrders').textContent = data.todayOrders;
                    document.getElementById('statSuccess').textContent = `${data.successRate}%`;
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }
        
        // ============================================
        // 加載交易記錄
        // ============================================
        async function loadTransactions() {
            const tbody = document.getElementById('transactionTable');
            const emptyState = document.getElementById('emptyState');
            const loading = document.getElementById('loading');
            
            loading.style.display = 'block';
            emptyState.style.display = 'none';
            tbody.innerHTML = '';
            
            try {
                const params = new URLSearchParams();
                if (document.getElementById('startDate').value) {
                    params.append('startDate', document.getElementById('startDate').value);
                }
                if (document.getElementById('endDate').value) {
                    params.append('endDate', document.getElementById('endDate').value);
                }
                if (document.getElementById('statusFilter').value) {
                    params.append('status', document.getElementById('statusFilter').value);
                }
                if (document.getElementById('payTypeFilter').value) {
                    params.append('payType', document.getElementById('payTypeFilter').value);
                }
                if (document.getElementById('orderNoFilter').value) {
                    params.append('orderNo', document.getElementById('orderNoFilter').value);
                }
                if (document.getElementById('payOrderIdFilter').value) {
                    params.append('payOrderId', document.getElementById('payOrderIdFilter').value);
                }
                
                const response = await fetch(`${API_BASE}/api/v1/${currentMerchant}/admin/transactions?${params}`);
                const result = await response.json();
                
                if (result.success) {
                    const transactions = result.data.transactions || [];
                    
                    if (transactions.length === 0) {
                        emptyState.style.display = 'block';
                    } else {
                        tbody.innerHTML = transactions.map(tx => `
                            <tr>
                                <td>${tx.createdAt}</td>
                                <td>${tx.orderNo}</td>
                                <td>${tx.payOrderId || '-'}</td>
                                <td>${PAY_TYPE_NAMES[tx.payType] || tx.payType}</td>
                                <td class="amount-cell">HK$ ${parseFloat(tx.amount).toFixed(2)}</td>
                                <td>
                                    <span class="status-badge ${tx.status}">
                                        ${STATUS_NAMES[tx.status] || tx.status}
                                    </span>
                                </td>
                                <td class="remark-cell">
                                    <span class="remark-text" onclick="editRemark('${tx.orderNo}', '${(tx.remark || '').replace(/'/g, "\\'")}')">
                                        ${tx.remark || '(點擊添加備註)'}
                                    </span>
                                </td>
                            </tr>
                        `).join('');
                    }
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showToast('加載失敗: ' + error.message, 'error');
            } finally {
                loading.style.display = 'none';
            }
        }
        
        // ============================================
        // 編輯備註
        // ============================================
        async function editRemark(orderNo, currentRemark) {
            const newRemark = prompt('輸入備註:', currentRemark === '(點擊添加備註)' ? '' : currentRemark);
            if (newRemark === null) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/${currentMerchant}/admin/remark`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderNo, remark: newRemark })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('備註已更新', 'success');
                    loadTransactions();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showToast('更新失敗: ' + error.message, 'error');
            }
        }
        
        // ============================================
        // 導出數據
        // ============================================
        function exportData() {
            const rows = [['時間', '訂單號', '支付訂單號', '支付方式', '金額', '狀態', '備註']];
            const tbody = document.getElementById('transactionTable');
            
            tbody.querySelectorAll('tr').forEach(tr => {
                const cells = tr.querySelectorAll('td');
                if (cells.length >= 6) {
                    rows.push([
                        cells[0].textContent,
                        cells[1].textContent,
                        cells[2].textContent,
                        cells[3].textContent,
                        cells[4].textContent,
                        cells[5].textContent.trim(),
                        cells[6]?.textContent?.trim() || ''
                    ]);
                }
            });
            
            const csv = rows.map(r => r.join(',')).join('\n');
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `transactions_${currentMerchant}_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }
        
        // ============================================
        // 顯示提示
        // ============================================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        // ============================================
        // 登出
        // ============================================
        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = '../login/';
        }
        
        // ============================================
        // 加載所有數據
        // ============================================
        function loadData() {
            loadStats();
            loadTransactions();
        }
        
        // ============================================
        // 綁定事件
        // ============================================
        ['startDate', 'endDate', 'statusFilter', 'payTypeFilter'].forEach(id => {
            document.getElementById(id).addEventListener('change', loadTransactions);
        });
        
        let debounceTimer;
        ['orderNoFilter', 'payOrderIdFilter'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(loadTransactions, 300);
            });
        });
        
        // ============================================
        // 初始化
        // ============================================
        loadMerchantConfig();
        loadData();
    </script>
</body>
</html>
