# Cloudflare Pages 自動部署 Workflow
# 使用方法：
# 1. 在你的 GitHub 倉庫中，創建 .github/workflows/ 文件夾
# 2. 將此文件命名為 deploy.yml 放入該文件夾
# 3. 在 Settings > Secrets > Actions 中添加以下 Secrets：
#    - CLOUDFLARE_API_TOKEN: 你的 Cloudflare API Token
#    - CLOUDFLARE_ACCOUNT_ID: 你的 Cloudflare 賬戶 ID

name: Deploy to Cloudflare Pages

on:
  # 當有代碼推送到 main 或 master 分支時自動觸發
  push:
    branches: [main, master]
  
  # 允許手動觸發（在 Actions 頁面點擊 "Run workflow"）
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Frontend
    
    steps:
      # 步驟 1: 檢出代碼
      - name: Checkout
        uses: actions/checkout@v4

      # 步驟 2: 設置 Node.js 環境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 步驟 3: 安裝 Wrangler CLI
      - name: Install Wrangler
        run: npm install -g wrangler@3

      # 步驟 4: 驗證文件
      - name: Verify files
        run: |
          echo "=== 檢查部署文件 ==="
          ls -la UpayClient/_KC/
          echo ""
          echo "=== 驗證 index.html ==="
          head -20 UpayClient/_KC/index.html

      # 步驟 5: 部署到 Cloudflare Pages
      # 方法 A: 使用 Wrangler CLI（推薦，更可靠）
      - name: Deploy via Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd UpayClient/_KC
          wrangler pages deploy . \
            --project-name=upay-client-kc \
            --branch=main \
            --commit-dirty=true

      # 方法 B: 使用 Cloudflare Pages Action（如果方法 A 失敗，注釋掉方法 A，取消注釋方法 B）
      # - name: Deploy to Cloudflare Pages
      #   uses: cloudflare/pages-action@v1
      #   with:
      #     apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      #     accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      #     projectName: upay-client-kc
      #     directory: UpayClient/_KC
      #     gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # 步驟 6: 顯示部署結果
      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 部署成功！"
            echo ""
            echo "🌐 訪問地址:"
            echo "   https://upay-client-kc.pages.dev"
            echo ""
            echo "⏳ 注意：CDN 傳播可能需要 1-2 分鈡"
          else
            echo "❌ 部署失敗"
            echo ""
            echo "請檢查："
            echo "1. Secrets 是否正確設置（CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID）"
            echo "2. upay-client-kc 項目是否已在 Cloudflare Dashboard 創建"
            echo "3. API Token 是否有 Pages 部署權限"
          fi
