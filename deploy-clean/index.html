<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King-Chicken 支付</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff9500 0%, #ffb84d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .payment-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ff9500 0%, #ff7700 100%);
            color: white;
            padding: 32px;
            text-align: center;
        }
        .logo { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .content { padding: 32px; }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
        }
        .amount-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .amount-btn {
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .amount-btn:hover, .amount-btn.selected {
            border-color: #ff9500;
            background: #ff9500;
            color: white;
        }
        .input-group { position: relative; margin-bottom: 24px; }
        .currency-symbol {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            font-weight: 600;
            color: #666;
        }
        .amount-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            transition: border-color 0.2s;
        }
        .amount-input:focus {
            outline: none;
            border-color: #ff9500;
        }
        .pay-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff9500 0%, #ff7700 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pay-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 149, 0, 0.4);
        }
        .pay-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .error-message.show { display: block; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="header">
            <div class="logo">🐔 King-Chicken</div>
            <div>安全便捷支付</div>
        </div>
        <div class="content">
            <div id="errorMessage" class="error-message"></div>
            
            <div class="section-title">選擇金額</div>
            <div class="amount-grid">
                <button class="amount-btn" data-amount="100">HK$ 100</button>
                <button class="amount-btn" data-amount="500">HK$ 500</button>
                <button class="amount-btn" data-amount="1000">HK$ 1,000</button>
                <button class="amount-btn" data-amount="2000">HK$ 2,000</button>
            </div>
            
            <div class="input-group">
                <span class="currency-symbol">HK$</span>
                <input type="number" class="amount-input" id="customAmount" placeholder="輸入自定金額" min="1" step="0.01">
            </div>
            
            <button class="pay-button" id="payButton" onclick="createPayment()">
                <span>確認支付</span>
            </button>
        </div>
    </div>

    <script>
        // API 配置
        const API_BASE = "https://payment-api.jimsbond007.workers.dev/api/v1/client/KC";
        
        let selectedAmount = null;
        
        // 金額選擇
        document.querySelectorAll(".amount-btn").forEach(btn => {
            btn.addEventListener("click", function() {
                document.querySelectorAll(".amount-btn").forEach(b => b.classList.remove("selected"));
                this.classList.add("selected");
                selectedAmount = parseFloat(this.dataset.amount);
                document.getElementById("customAmount").value = "";
            });
        });
        
        // 自定義金額
        document.getElementById("customAmount").addEventListener("input", function() {
            document.querySelectorAll(".amount-btn").forEach(b => b.classList.remove("selected"));
            selectedAmount = parseFloat(this.value) || null;
        });
        
        function showError(message) {
            const errorEl = document.getElementById("errorMessage");
            errorEl.textContent = message;
            errorEl.classList.add("show");
            setTimeout(() => errorEl.classList.remove("show"), 5000);
        }
        
        async function createPayment() {
            if (!selectedAmount || selectedAmount <= 0) {
                showError("請選擇或輸入有效的支付金額");
                return;
            }
            
            const button = document.getElementById("payButton");
            button.disabled = true;
            button.innerHTML = "<span class='loading'></span><span>處理中...</span>";
            
            try {
                console.log("Sending POST to:", API_BASE + "/payment/create");
                
                const response = await fetch(API_BASE + "/payment/create", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        amount: selectedAmount,
                        payType: "UP_OP",
                        subject: "King-Chicken Payment"
                    })
                });
                
                console.log("Response status:", response.status);
                
                const result = await response.json();
                console.log("Response data:", result);
                
                if (result.success && result.data.payUrl) {
                    window.location.href = result.data.payUrl;
                } else {
                    showError(result.error || "創建支付訂單失敗");
                    button.disabled = false;
                    button.innerHTML = "<span>確認支付</span>";
                }
            } catch (error) {
                console.error("Payment error:", error);
                showError("網絡錯誤，請重試");
                button.disabled = false;
                button.innerHTML = "<span>確認支付</span>";
            }
        }
    </script>
</body>
</html>
