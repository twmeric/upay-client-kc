<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付失敗 - King-Chicken</title>
    <link rel="icon" type="image/png" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --hermes-orange: #FF6B00;
            --hermes-dark: #E55A00;
            --cream: #FAF7F2;
            --cream-dark: #F5F0E8;
            --beige: #EDE8E0;
            --text-dark: #2C2419;
            --text-medium: #5C4F3D;
            --text-light: #8B7D6B;
            --white: #FFFFFF;
            --gold: #C9A961;
            --danger: #dc2626;
            --warning: #d97706;
        }

        body {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--beige) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .fail-container {
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 20px 60px -15px rgba(44, 36, 25, 0.15);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            border: 1px solid rgba(201, 169, 97, 0.2);
            text-align: center;
        }

        .header {
            background: linear-gradient(135deg, var(--cream-dark) 0%, var(--beige) 100%);
            padding: 40px 32px;
            border-bottom: 3px solid var(--danger);
        }

        .logo img {
            height: 60px;
            width: auto;
            margin-bottom: 16px;
        }

        .fail-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--danger), #b91c1c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 50px;
            color: white;
            box-shadow: 0 8px 24px rgba(220, 38, 38, 0.3);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .fail-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--danger);
            margin-bottom: 8px;
        }

        .fail-subtitle {
            font-size: 14px;
            color: var(--text-light);
        }

        .content {
            padding: 32px;
        }

        .error-box {
            background: rgba(220, 38, 38, 0.05);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }

        .error-title {
            font-size: 14px;
            color: var(--danger);
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-message {
            font-size: 14px;
            color: var(--text-medium);
            line-height: 1.6;
        }

        .order-info {
            background: var(--cream);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: var(--text-light);
        }

        .info-value {
            color: var(--text-dark);
            font-weight: 500;
        }

        .info-value.amount {
            color: var(--hermes-orange);
            font-weight: 600;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--hermes-orange), var(--hermes-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
            margin-bottom: 12px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 0, 0.4);
        }

        .btn-secondary {
            background: var(--cream);
            color: var(--text-medium);
            border: 1px solid var(--beige);
        }

        .btn-secondary:hover {
            background: var(--beige);
        }

        .help-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--beige);
        }

        .help-title {
            font-size: 14px;
            color: var(--text-medium);
            margin-bottom: 12px;
        }

        .help-links {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .help-link {
            font-size: 13px;
            color: var(--hermes-orange);
            text-decoration: none;
            padding: 8px 16px;
            background: var(--cream);
            border-radius: 8px;
            border: 1px solid var(--beige);
        }

        .help-link:hover {
            background: var(--beige);
        }

        .footer {
            padding: 20px;
            border-top: 1px solid var(--beige);
            font-size: 12px;
            color: var(--text-light);
        }

        @media (max-width: 480px) {
            .fail-container {
                border-radius: 0;
                min-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="fail-container">
        <div class="header">
            <div class="logo">
                <img src="logo-kc.png" alt="King-Chicken" onerror="this.style.display='none'">
            </div>
            <div class="fail-icon">✕</div>
            <h1 class="fail-title">支付失敗</h1>
            <p class="fail-subtitle">訂單支付未成功，請重新嘗試</p>
        </div>
        
        <div class="content">
            <div class="error-box">
                <div class="error-title">
                    <span>⚠️</span>
                    <span>失敗原因</span>
                </div>
                <div class="error-message" id="errorMessage">
                    支付過程中出現錯誤，可能原因包括：銀行卡餘額不足、銀行拒絕交易、網絡連接超時或支付已取消。請檢查您的支付方式後重新嘗試。
                </div>
            </div>
            
            <div class="order-info">
                <div class="info-row">
                    <span class="info-label">訂單編號</span>
                    <span class="info-value" id="orderNo">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">支付金額</span>
                    <span class="info-value amount" id="amount">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">失敗時間</span>
                    <span class="info-value" id="failTime">-</span>
                </div>
            </div>
            
            <a href="./" class="btn btn-primary">
                🔄 重新支付
            </a>
            <button class="btn btn-secondary" onclick="goHome()">
                🏠 返回首頁
            </button>
            
            <div class="help-section">
                <div class="help-title">需要幫助？</div>
                <div class="help-links">
                    <a href="tel:+85298113210" class="help-link">📞 聯繫客服</a>
                    <a href="#" class="help-link" onclick="showFAQ(); return false;">❓ 常見問題</a>
                </div>
            </div>
        </div>
        
        <div class="footer">
            如問題持續，請聯繫客服協助<br>
            King-Chicken 支付系統
        </div>
    </div>

    <script>
        // 解析 URL 參數
        const urlParams = new URLSearchParams(window.location.search);
        
        // 獲取訂單信息
        const orderNo = urlParams.get('mchOrderNo') || urlParams.get('orderNo') || '-';
        const amount = urlParams.get('amount');
        const errorCode = urlParams.get('errCode');
        const errorMsg = urlParams.get('errMsg');
        
        // 顯示訂單信息
        document.getElementById('orderNo').textContent = orderNo;
        
        // 格式化金額
        if (amount) {
            const formattedAmount = (parseFloat(amount) / 100).toLocaleString('zh-HK', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            document.getElementById('amount').textContent = `HK$ ${formattedAmount}`;
        } else {
            document.getElementById('amount').textContent = '-';
        }
        
        // 顯示失敗時間
        document.getElementById('failTime').textContent = new Date().toLocaleString('zh-HK');
        
        // 顯示具體錯誤信息（如果有）
        if (errorMsg) {
            document.getElementById('errorMessage').textContent = decodeURIComponent(errorMsg);
        } else if (errorCode) {
            const errorMessages = {
                'ACQ.PAYMENT_AUTH_CODE_INVALID': '支付授權碼無效，請重新嘗試',
                'ACQ.INSUFFICIENT_BALANCE': '餘額不足，請更換支付方式',
                'ACQ.BANK_CARD_ERROR': '銀行卡異常，請聯繫發卡行',
                'ACQ.USER_PAYMENT_CANCELLED': '支付已取消，請重新發起',
                'ACQ.USER_PAYMENT_TIMEOUT': '支付超時，請重新嘗試'
            };
            document.getElementById('errorMessage').textContent = 
                errorMessages[errorCode] || `支付失敗（錯誤碼：${errorCode}），請重新嘗試`;
        }
        
        // 返回首頁
        function goHome() {
            window.location.href = './';
        }
        
        // 顯示常見問題
        function showFAQ() {
            alert(`常見問題：\n\n1. 為什麼支付失敗？\n   可能原因：餘額不足、銀行限制、網絡問題\n\n2. 已扣款但顯示失敗？\n   請聯繫客服核實，款項將在 3-7 個工作日退還\n\n3. 如何更換支付方式？\n   返回首頁重新選擇支付方式即可\n\n客服電話：+852 9811 3210`);
        }
    </script>
</body>
</html>
