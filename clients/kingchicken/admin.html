<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King-Chicken 管理後台</title>
    <link rel="icon" type="image/png" href="favicon.ico">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --hermes-orange: #FF6B00;
            --hermes-dark: #E55A00;
            --cream: #FAF7F2;
            --cream-dark: #F5F0E8;
            --beige: #EDE8E0;
            --text-dark: #2C2419;
            --text-medium: #5C4F3D;
            --text-light: #8B7D6B;
            --white: #FFFFFF;
            --gold: #C9A961;
            --success: #16a34a;
            --warning: #d97706;
            --danger: #dc2626;
        }

        body {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            background: var(--cream);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--white) 0%, var(--cream) 100%);
            border-bottom: 1px solid var(--beige);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(44, 36, 25, 0.08);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--hermes-orange), var(--gold), var(--hermes-orange));
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand img {
            height: 48px;
            width: auto;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-dark);
            letter-spacing: 1px;
        }

        .brand-subtitle {
            font-size: 11px;
            color: var(--text-light);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: var(--cream-dark);
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-medium);
            border: 1px solid var(--beige);
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--hermes-orange), var(--hermes-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .logout-btn {
            padding: 10px 18px;
            background: transparent;
            color: var(--text-medium);
            border: 2px solid var(--beige);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        /* 統計卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--beige);
            box-shadow: 0 4px 20px rgba(44, 36, 25, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(44, 36, 25, 0.1);
        }

        .stat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .stat-icon.orange {
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.15), rgba(255, 107, 0, 0.05));
        }

        .stat-icon.gold {
            background: linear-gradient(135deg, rgba(201, 169, 97, 0.15), rgba(201, 169, 97, 0.05));
        }

        .stat-icon.green {
            background: linear-gradient(135deg, rgba(22, 163, 74, 0.15), rgba(22, 163, 74, 0.05));
        }

        .stat-icon.blue {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.15), rgba(37, 99, 235, 0.05));
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--text-dark);
            margin-top: 4px;
        }

        .stat-change {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-change.positive {
            color: var(--success);
        }

        /* 內容區塊 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .card {
            background: var(--white);
            border-radius: 16px;
            border: 1px solid var(--beige);
            box-shadow: 0 4px 20px rgba(44, 36, 25, 0.06);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--beige);
            background: linear-gradient(135deg, var(--cream) 0%, var(--white) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .card-title {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 3px;
            height: 18px;
            background: linear-gradient(180deg, var(--hermes-orange), var(--gold));
            border-radius: 2px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--hermes-orange), var(--hermes-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 0, 0.4);
        }

        .btn-secondary {
            background: var(--cream);
            color: var(--text-medium);
            border: 1px solid var(--beige);
        }

        .btn-secondary:hover {
            background: var(--beige);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .card-body {
            padding: 24px;
        }

        /* 篩選器 */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-input {
            padding: 10px 14px;
            border: 1px solid var(--beige);
            border-radius: 8px;
            font-size: 14px;
            background: var(--white);
            color: var(--text-dark);
            min-width: 160px;
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
        }

        .filter-input:focus {
            outline: none;
            border-color: var(--hermes-orange);
            box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.08);
        }

        /* 表格 */
        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 14px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--cream);
            border-bottom: 2px solid var(--beige);
        }

        .data-table td {
            padding: 16px;
            font-size: 14px;
            color: var(--text-medium);
            border-bottom: 1px solid var(--beige);
        }

        .data-table tr:hover td {
            background: var(--cream);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.success {
            background: rgba(22, 163, 74, 0.1);
            color: var(--success);
        }

        .status-badge.pending {
            background: rgba(217, 119, 6, 0.1);
            color: var(--warning);
        }

        .status-badge.failed {
            background: rgba(220, 38, 38, 0.1);
            color: var(--danger);
        }

        .amount-cell {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            font-weight: 600;
            color: var(--hermes-orange);
        }

        /* 空狀態 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 48px;
            color: var(--text-light);
        }

        /* 響應式 */
        @media (max-width: 768px) {
            .header-content {
                padding: 12px 16px;
                flex-direction: column;
                gap: 12px;
            }

            .brand img {
                height: 36px;
            }

            .main-container {
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .stat-card {
                padding: 20px;
            }

            .card-header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .filter-bar {
                flex-direction: column;
            }

            .filter-input {
                width: 100%;
            }

            .data-table {
                font-size: 13px;
            }

            .data-table th,
            .data-table td {
                padding: 12px 10px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="brand">
                <img src="logo-kc.png" alt="King-Chicken">
                <div class="brand-text">
                    <span class="brand-name">KING-CHICKEN</span>
                    <span class="brand-subtitle">Admin Portal</span>
                </div>
            </div>
            <nav class="nav-menu" style="display: flex; gap: 8px;">
                <a href="admin.html" class="nav-link" style="padding: 10px 20px; background: var(--hermes-orange); color: white; border-radius: 8px; text-decoration: none; font-weight: 500;">交易記錄</a>
                <a href="boss-report.html" class="nav-link" style="padding: 10px 20px; background: var(--cream-dark); color: var(--text-medium); border-radius: 8px; text-decoration: none; font-weight: 500; border: 1px solid var(--beige);">管理者報告</a>
                <a href="drivers.html" class="nav-link" style="padding: 10px 20px; background: var(--cream-dark); color: var(--text-medium); border-radius: 8px; text-decoration: none; font-weight: 500; border: 1px solid var(--beige);">司機管理</a>
            </nav>
            <div class="header-actions">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">M</div>
                    <span id="userName">mimichu</span>
                </div>
                <button class="logout-btn" onclick="logout()">登出</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <!-- 統計卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon orange">💰</div>
                    <span class="stat-label">今日收入</span>
                </div>
                <div class="stat-value" id="todayRevenue">HK$ 0.00</div>
                <div class="stat-change positive">+12.5% 較昨日</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon gold">📊</div>
                    <span class="stat-label">交易筆數</span>
                </div>
                <div class="stat-value" id="todayCount">0</div>
                <div class="stat-change">今日訂單</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon green">✓</div>
                    <span class="stat-label">成功率</span>
                </div>
                <div class="stat-value" id="successRate">98.5%</div>
                <div class="stat-change positive">過去30天</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon blue">⏱</div>
                    <span class="stat-label">平均處理</span>
                </div>
                <div class="stat-value">1.2s</div>
                <div class="stat-change">支付響應時間</div>
            </div>
            <!-- Driver Stats -->
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon orange" style="background: linear-gradient(135deg, rgba(37, 99, 235, 0.15), rgba(37, 99, 235, 0.05))">🚚</div>
                    <span class="stat-label">司機收款 (KC001)</span>
                </div>
                <div class="stat-value" id="driverRevenue">HK$ 0.00</div>
                <div class="stat-change">今日張師傅</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon orange" style="background: linear-gradient(135deg, rgba(217, 119, 6, 0.15), rgba(217, 119, 6, 0.05))">🚚</div>
                    <span class="stat-label">司機收款 (KC002)</span>
                </div>
                <div class="stat-value" id="driver2Revenue">HK$ 0.00</div>
                <div class="stat-change">今日李師傅</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon orange" style="background: linear-gradient(135deg, rgba(22, 163, 74, 0.15), rgba(22, 163, 74, 0.05))">🚚</div>
                    <span class="stat-label">司機收款 (KC003)</span>
                </div>
                <div class="stat-value" id="driver3Revenue">HK$ 0.00</div>
                <div class="stat-change">今日王師傅</div>
            </div>
        </div>

        <!-- 交易記錄 -->
        <div class="content-grid">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">交易記錄</div>
                    <div class="card-actions">
                        <button class="btn btn-secondary" onclick="refreshData()">🔄 刷新</button>
                        <button class="btn btn-primary" onclick="exportData()">📥 導出</button>
                    </div>
                </div>
                <div class="card-body">
                    <!-- 篩選器 -->
                    <div class="filter-bar">
                        <input type="date" class="filter-input" id="startDate" placeholder="開始日期">
                        <input type="date" class="filter-input" id="endDate" placeholder="結束日期">
                        <select class="filter-input" id="statusFilter">
                            <option value="">所有狀態</option>
                            <option value="success">成功</option>
                            <option value="pending">處理中</option>
                            <option value="failed">失敗</option>
                        </select>
                        <select class="filter-input" id="payTypeFilter">
                            <option value="">所有支付方式</option>
                            <option value="UP_OP">銀聯</option>
                            <option value="ALI_H5">支付寶</option>
                            <option value="WX_H5">微信</option>
                        </select>
                        <select class="filter-input" id="driverFilter">
                            <option value="">所有司機</option>
                            <option value="KC001">KC001 - 張師傅</option>
                            <option value="KC002">KC002 - 李師傅</option>
                            <option value="KC003">KC003 - 王師傅</option>
                        </select>
                        <input type="text" class="filter-input" id="searchInput" placeholder="搜索訂單號...">
                    </div>

                    <div class="table-container">
                        <div class="loading" id="loading">加載中...</div>
                        <table class="data-table" id="transactionsTable" style="display: none;">
                            <thead>
                                <tr>
                                    <th>訂單號</th>
                                    <th>支付訂單號</th>
                                    <th>時間</th>
                                    <th>金額</th>
                                    <th>支付方式</th>
                                    <th>配送司機</th>
                                    <th>狀態</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="transactionTable">
                            </tbody>
                        </table>
                        <div class="empty-state" id="emptyState" style="display: none;">
                            <div class="empty-icon">📭</div>
                            <div class="empty-text">暫無交易記錄</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'https://easylink-api-v2.jimsbond007.workers.dev';
        const merchantCode = 'KC';

        // 檢查登入狀態
        function checkAuth() {
            const loginTime = sessionStorage.getItem('kc_admin_login');
            const username = sessionStorage.getItem('kc_admin_user');
            
            if (!loginTime || !username) {
                window.location.href = 'login.html';
                return false;
            }
            
            // 檢查登入是否超過 8 小時
            if (Date.now() - parseInt(loginTime) > 8 * 60 * 60 * 1000) {
                logout();
                return false;
            }
            
            document.getElementById('userName').textContent = username;
            document.getElementById('userAvatar').textContent = username[0].toUpperCase();
            return true;
        }

        function logout() {
            sessionStorage.removeItem('kc_admin_user');
            sessionStorage.removeItem('kc_admin_login');
            window.location.href = 'login.html';
        }

        // 防抖函數
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        async function loadTransactions() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/${merchantCode}/admin/transactions`);
                
                if (!response.ok) {
                    throw new Error('Failed to load transactions');
                }

                const result = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (result.success && result.data && result.data.transactions && result.data.transactions.length > 0) {
                    const transactions = result.data.transactions;
                    renderTransactions(transactions);
                    
                    if (result.data.statistics) {
                        updateStats(result.data.statistics);
                    }
                    
                    document.getElementById('transactionsTable').style.display = 'table';
                    document.getElementById('emptyState').style.display = 'none';
                } else {
                    document.getElementById('transactionsTable').style.display = 'none';
                    document.getElementById('emptyState').style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('loading').textContent = '加載失敗，請點擊刷新重試';
            }
        }

        function renderTransactions(transactions) {
            const tbody = document.getElementById('transactionTable');
            const emptyState = document.getElementById('emptyState');

            if (!transactions || transactions.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            
            const methodNames = {
                'UP_OP': '銀聯',
                'ALI_H5': '支付寶',
                'WX_H5': '微信'
            };
            
            const driverNames = {
                'KC001': '張師傅',
                'KC002': '李師傅',
                'KC003': '王師傅'
            };

            tbody.innerHTML = transactions.slice(0, 100).map(tx => {
                let statusClass = 'pending';
                let statusText = '處理中';
                if (tx.status === 'success') {
                    statusClass = 'success';
                    statusText = '成功';
                } else if (tx.status === 'failed') {
                    statusClass = 'failed';
                    statusText = '失敗';
                }
                
                const driverInfo = tx.driverCode ? 
                    `<span style="display:inline-flex;align-items:center;gap:4px;">🚚 ${tx.driverCode} ${driverNames[tx.driverCode] || ''}</span>` : 
                    '<span style="color:#999">-</span>';
                
                return `
                    <tr>
                        <td>${tx.orderNo}</td>
                        <td>${tx.payOrderId || '-'}</td>
                        <td>${tx.createdAt}</td>
                        <td class="amount-cell">HK$ ${parseFloat(tx.amount).toFixed(2)}</td>
                        <td>${methodNames[tx.payType] || tx.payType}</td>
                        <td>${driverInfo}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="viewDetail('${tx.orderNo}')">
                                詳情
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateStats(stats) {
            if (stats.todayRevenue !== undefined) {
                document.getElementById('todayRevenue').textContent = `HK$ ${parseFloat(stats.todayRevenue).toFixed(2)}`;
            }
            if (stats.todayOrders !== undefined) {
                document.getElementById('todayCount').textContent = stats.todayOrders;
            }
            if (stats.successRate !== undefined) {
                document.getElementById('successRate').textContent = `${stats.successRate}%`;
            }
            // Driver stats
            if (stats.driverRevenue) {
                document.getElementById('driverRevenue').textContent = 
                    `HK$ ${parseFloat(stats.driverRevenue['KC001'] || 0).toFixed(2)}`;
                document.getElementById('driver2Revenue').textContent = 
                    `HK$ ${parseFloat(stats.driverRevenue['KC002'] || 0).toFixed(2)}`;
                document.getElementById('driver3Revenue').textContent = 
                    `HK$ ${parseFloat(stats.driverRevenue['KC003'] || 0).toFixed(2)}`;
            }
        }

        // 篩選功能
        async function filterTransactions() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const status = document.getElementById('statusFilter').value;
            const payType = document.getElementById('payTypeFilter').value;
            const driverCode = document.getElementById('driverFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            try {
                let url = `${API_BASE}/api/v1/${merchantCode}/admin/transactions`;
                const params = [];
                if (startDate) params.push(`startDate=${startDate}`);
                if (endDate) params.push(`endDate=${endDate}`);
                if (status) params.push(`status=${status}`);
                if (payType) params.push(`payType=${payType}`);
                if (driverCode) params.push(`driverCode=${driverCode}`);
                if (params.length > 0) url += '?' + params.join('&');
                
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success && result.data && result.data.transactions) {
                    let transactions = result.data.transactions;
                    
                    // 客戶端搜索
                    if (search) {
                        transactions = transactions.filter(tx => 
                            (tx.orderNo || '').toLowerCase().includes(search) ||
                            (tx.payOrderId || '').toLowerCase().includes(search) ||
                            (tx.driverCode || '').toLowerCase().includes(search)
                        );
                    }
                    
                    renderTransactions(transactions);
                }
            } catch (error) {
                console.error('Error filtering:', error);
            }
        }

        function refreshData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('transactionsTable').style.display = 'none';
            loadTransactions();
        }

        function exportData() {
            // 獲取當前顯示的交易數據並導出為 CSV
            const table = document.getElementById('transactionTable');
            const rows = table.querySelectorAll('tr');
            
            if (rows.length === 0) {
                alert('暫無數據可導出');
                return;
            }
            
            let csv = '訂單號,支付訂單號,時間,金額,支付方式,配送司機,狀態\n';
            
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 7) {
                    const orderNo = cells[0].textContent;
                    const payOrderId = cells[1].textContent;
                    const time = cells[2].textContent;
                    const amount = cells[3].textContent.replace('HK$ ', '');
                    const payType = cells[4].textContent;
                    const driver = cells[5].textContent.trim().replace('🚚 ', '');
                    const status = cells[6].textContent.trim();
                    csv += `${orderNo},${payOrderId},${time},${amount},${payType},${driver},${status}\n`;
                }
            });
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `kingchicken_transactions_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        function viewDetail(orderNo) {
            alert('訂單詳情：' + orderNo);
        }

        // 綁定篩選事件
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuth()) return;
            
            loadTransactions();
            
            // 設置默認日期
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('endDate').value = today;
            const lastWeek = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            document.getElementById('startDate').value = lastWeek;
            
            // 綁定篩選事件
            document.getElementById('startDate').addEventListener('change', debounce(filterTransactions, 300));
            document.getElementById('endDate').addEventListener('change', debounce(filterTransactions, 300));
            document.getElementById('statusFilter').addEventListener('change', debounce(filterTransactions, 300));
            document.getElementById('payTypeFilter').addEventListener('change', debounce(filterTransactions, 300));
            document.getElementById('driverFilter').addEventListener('change', debounce(filterTransactions, 300));
            document.getElementById('searchInput').addEventListener('input', debounce(filterTransactions, 300));
        });
    </script>
</body>
</html>
