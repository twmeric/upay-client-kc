<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King-Chicken 管理後台</title>
    <link rel="icon" type="image/png" href="favicon.ico">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --hermes-orange: #FF6B00;
            --hermes-dark: #E55A00;
            --cream: #FAF7F2;
            --cream-dark: #F5F0E8;
            --beige: #EDE8E0;
            --text-dark: #2C2419;
            --text-medium: #5C4F3D;
            --text-light: #8B7D6B;
            --white: #FFFFFF;
            --gold: #C9A961;
            --success: #16a34a;
            --warning: #d97706;
            --danger: #dc2626;
        }

        /* Dark Mode Variables */
        [data-theme="dark"] {
            --cream: #1a1a2e;
            --cream-dark: #16213e;
            --beige: #0f3460;
            --text-dark: #e94560;
            --text-medium: #eaeaea;
            --text-light: #a0a0a0;
            --white: #16213e;
        }

        body {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        .header {
            background: linear-gradient(135deg, var(--white) 0%, var(--cream) 100%);
            border-bottom: 1px solid var(--beige);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(44, 36, 25, 0.08);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--hermes-orange), var(--gold), var(--hermes-orange));
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand img {
            height: 48px;
            width: auto;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-dark);
            letter-spacing: 1px;
        }

        .brand-subtitle {
            font-size: 11px;
            color: var(--text-light);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: var(--cream-dark);
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-medium);
            border: 1px solid var(--beige);
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--hermes-orange), var(--hermes-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .logout-btn {
            padding: 10px 18px;
            background: transparent;
            color: var(--text-medium);
            border: 2px solid var(--beige);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        /* 統計卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--beige);
            box-shadow: 0 4px 20px rgba(44, 36, 25, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(44, 36, 25, 0.1);
        }

        .stat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .stat-icon.orange {
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.15), rgba(255, 107, 0, 0.05));
        }

        .stat-icon.gold {
            background: linear-gradient(135deg, rgba(201, 169, 97, 0.15), rgba(201, 169, 97, 0.05));
        }

        .stat-icon.green {
            background: linear-gradient(135deg, rgba(22, 163, 74, 0.15), rgba(22, 163, 74, 0.05));
        }

        .stat-icon.blue {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.15), rgba(37, 99, 235, 0.05));
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--text-dark);
            margin-top: 4px;
        }

        .stat-change {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-change.positive {
            color: var(--success);
        }

        /* 內容區塊 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .card {
            background: var(--white);
            border-radius: 16px;
            border: 1px solid var(--beige);
            box-shadow: 0 4px 20px rgba(44, 36, 25, 0.06);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--beige);
            background: linear-gradient(135deg, var(--cream) 0%, var(--white) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .card-title {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 3px;
            height: 18px;
            background: linear-gradient(180deg, var(--hermes-orange), var(--gold));
            border-radius: 2px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--hermes-orange), var(--hermes-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 0, 0.4);
        }

        .btn-secondary {
            background: var(--cream);
            color: var(--text-medium);
            border: 1px solid var(--beige);
        }

        .btn-secondary:hover {
            background: var(--beige);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .card-body {
            padding: 24px;
        }

        /* 篩選器 */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-input {
            padding: 10px 14px;
            border: 1px solid var(--beige);
            border-radius: 8px;
            font-size: 14px;
            background: var(--white);
            color: var(--text-dark);
            min-width: 160px;
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
        }

        .filter-input:focus {
            outline: none;
            border-color: var(--hermes-orange);
            box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.08);
        }

        /* 表格 */
        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 14px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--cream);
            border-bottom: 2px solid var(--beige);
        }

        .data-table td {
            padding: 16px;
            font-size: 14px;
            color: var(--text-medium);
            border-bottom: 1px solid var(--beige);
        }

        .data-table tr:hover td {
            background: var(--cream);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.success {
            background: rgba(22, 163, 74, 0.1);
            color: var(--success);
        }

        .status-badge.pending {
            background: rgba(217, 119, 6, 0.1);
            color: var(--warning);
        }

        .status-badge.failed {
            background: rgba(220, 38, 38, 0.1);
            color: var(--danger);
        }

        .amount-cell {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            font-weight: 600;
            color: var(--hermes-orange);
        }

        /* 空狀態 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 48px;
            color: var(--text-light);
        }

        /* 響應式 */
        @media (max-width: 768px) {
            .header-content {
                padding: 12px 16px;
                flex-direction: column;
                gap: 12px;
            }

            .brand img {
                height: 36px;
            }

            .main-container {
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .stat-card {
                padding: 20px;
            }

            .card-header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .filter-bar {
                flex-direction: column;
            }

            .filter-input {
                width: 100%;
            }

            .data-table {
                font-size: 13px;
            }

            .data-table th,
            .data-table td {
                padding: 12px 10px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="brand">
                <img src="logo-kc.png" alt="King-Chicken">
                <div class="brand-text">
                    <span class="brand-name">KING-CHICKEN</span>
                    <span class="brand-subtitle">Admin Portal</span>
                </div>
            </div>
            <nav class="nav-menu" style="display: flex; gap: 8px;">
                <a href="admin.html" class="nav-link" style="padding: 10px 20px; background: var(--hermes-orange); color: white; border-radius: 8px; text-decoration: none; font-weight: 500;">交易記錄</a>
                <a href="boss-report.html" class="nav-link" style="padding: 10px 20px; background: var(--cream-dark); color: var(--text-medium); border-radius: 8px; text-decoration: none; font-weight: 500; border: 1px solid var(--beige);">管理者報告</a>
                <a href="drivers.html" class="nav-link" style="padding: 10px 20px; background: var(--cream-dark); color: var(--text-medium); border-radius: 8px; text-decoration: none; font-weight: 500; border: 1px solid var(--beige);">渠道管理</a>
            </nav>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="toggleDarkMode()" style="margin-right: 12px;">
                    🌓 深色模式
                </button>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">M</div>
                    <span id="userName">mimichu</span>
                </div>
                <button class="logout-btn" onclick="logout()">登出</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <!-- 統計卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon orange">💰</div>
                    <span class="stat-label">今日收入</span>
                </div>
                <div class="stat-value" id="todayRevenue">—</div>
                <div class="stat-change positive">+12.5% 較昨日</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon gold">📊</div>
                    <span class="stat-label">交易筆數</span>
                </div>
                <div class="stat-value" id="todayCount">—</div>
                <div class="stat-change">今日訂單</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon green">✓</div>
                    <span class="stat-label">成功率</span>
                </div>
                <div class="stat-value" id="successRate">—</div>
                <div class="stat-change positive">過去30天</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon blue">⏱</div>
                    <span class="stat-label">平均處理</span>
                </div>
                <div class="stat-value">1.2s</div>
                <div class="stat-change">支付響應時間</div>
            </div>
        </div>

        <!-- 交易記錄 -->
        <div class="content-grid">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">交易記錄</div>
                    <div class="card-actions">
                        <button class="btn btn-primary" onclick="exportData()">📥 導出</button>
                    </div>
                </div>
                <div class="card-body">
                    <!-- 篩選器 -->
                    <div class="filter-bar">
                        <input type="date" class="filter-input" id="startDate" placeholder="開始日期">
                        <input type="date" class="filter-input" id="endDate" placeholder="結束日期">
                        <select class="filter-input" id="statusFilter">
                            <option value="">所有狀態</option>
                            <option value="success">成功</option>
                            <option value="pending">處理中</option>
                            <option value="failed">失敗</option>
                        </select>
                        <select class="filter-input" id="payTypeFilter">
                            <option value="">所有支付方式</option>
                            <option value="UP_OP">銀聯</option>
                            <option value="ALI_H5">支付寶</option>
                            <option value="WX_H5">微信</option>
                        </select>
                        <select class="filter-input" id="driverFilter">
                            <option value="">所有渠道</option>
                            <option value="KC001">KC001 - 張師傅渠道</option>
                            <option value="KC002">KC002 - 李師傅渠道</option>
                            <option value="KC003">KC003 - 王師傅渠道</option>
                        </select>
                        <input type="text" class="filter-input" id="searchInput" placeholder="搜索訂單號...">
                    </div>

                    <!-- EasyLink 同步區域 -->
                    <div style="display: flex; gap: 12px; margin-bottom: 20px; padding: 16px; background: var(--cream); border-radius: 12px; border: 1px solid var(--beige);">
                        <div style="flex: 1; display: flex; align-items: center; gap: 12px;">
                            <span style="color: var(--text-medium); font-size: 14px;">📅 同步日期：</span>
                            <input type="date" class="filter-input" id="syncDate" style="width: 140px;">
                            <span style="color: var(--text-light); font-size: 13px;">(留空則同步最近3天)</span>
                        </div>
                        <button class="btn btn-primary" id="syncBtn" onclick="syncEasyLinkOrders()">
                            🔄 同步 EasyLink 訂單
                        </button>
                    </div>
                    
                    <!-- 同步結果顯示 -->
                    <div id="syncResult" style="display: none; margin-bottom: 20px; padding: 16px; border-radius: 12px; font-size: 14px;"></div>

                    <div class="table-container">
                        <div class="loading" id="loading">加載中...</div>
                        <table class="data-table" id="transactionsTable" style="display: none; table-layout: fixed;">
                            <thead>
                                <tr>
                                    <th style="width: 14%;">訂單號</th>
                                    <th style="width: 18%;">支付訂單號</th>
                                    <th style="width: 13%; white-space: nowrap;">時間</th>
                                    <th style="width: 11%;">金額</th>
                                    <th style="width: 10%;">支付方式</th>
                                    <th style="width: 12%;">收款渠道</th>
                                    <th style="width: 8%;">狀態</th>
                                    <th style="width: 14%;">備註</th>
                                </tr>
                            </thead>
                            <tbody id="transactionTable">
                            </tbody>
                        </table>
                        <div class="empty-state" id="emptyState" style="display: none;">
                            <div class="empty-icon">📭</div>
                            <div class="empty-text">暫無交易記錄</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'https://easylink-api-v2.jimsbond007.workers.dev';
        const merchantCode = 'KC';

        // Dark Mode 切換
        function toggleDarkMode() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // 初始化主題
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
        }

        // 檢查登入狀態
        function checkAuth() {
            const loginTime = sessionStorage.getItem('kc_admin_login');
            const username = sessionStorage.getItem('kc_admin_user');
            
            if (!loginTime || !username) {
                window.location.href = 'login.html';
                return false;
            }
            
            // 檢查登入是否超過 8 小時
            if (Date.now() - parseInt(loginTime) > 8 * 60 * 60 * 1000) {
                logout();
                return false;
            }
            
            document.getElementById('userName').textContent = username;
            document.getElementById('userAvatar').textContent = username[0].toUpperCase();
            return true;
        }

        function logout() {
            sessionStorage.removeItem('kc_admin_user');
            sessionStorage.removeItem('kc_admin_login');
            window.location.href = 'login.html';
        }

        // 防抖函數
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        async function loadTransactions() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/${merchantCode}/admin/transactions`);
                
                if (!response.ok) {
                    throw new Error('Failed to load transactions');
                }

                const result = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (result.success && result.data && result.data.transactions && result.data.transactions.length > 0) {
                    const transactions = result.data.transactions;
                    renderTransactions(transactions);
                    
                    document.getElementById('transactionsTable').style.display = 'table';
                    document.getElementById('emptyState').style.display = 'none';
                } else {
                    document.getElementById('transactionsTable').style.display = 'none';
                    document.getElementById('emptyState').style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('loading').textContent = '加載失敗，請點擊刷新重試';
            }
        }

        // 單獲加載統計數據
        async function loadStatistics() {
            try {
                console.log('Loading statistics from:', `${API_BASE}/api/v1/${merchantCode}/admin/statistics`);
                const response = await fetch(`${API_BASE}/api/v1/${merchantCode}/admin/statistics`);
                
                if (!response.ok) {
                    throw new Error(`Failed to load statistics: ${response.status}`);
                }

                const result = await response.json();
                console.log('Statistics API response:', result);
                
                if (result.success && result.data) {
                    const stats = result.data;
                    console.log('Updating stats:', stats);
                    updateStats(stats);
                } else {
                    console.warn('Invalid response format:', result);
                }
            } catch (error) {
                console.error('Error loading statistics:', error);
                // 顯示錯誤狀態但不影響用戶體驗
                console.warn('Statistics load failed, showing default values');
            }
        }

        function renderTransactions(transactions) {
            const tbody = document.getElementById('transactionTable');
            const emptyState = document.getElementById('emptyState');

            if (!transactions || transactions.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            
            const methodNames = {
                'UP_OP': '銀聯',
                'ALI_H5': '支付寶',
                'WX_H5': '微信'
            };
            
            const driverNames = {
                'KC001': '張師傅',
                'KC002': '李師傅',
                'KC003': '王師傅'
            };

            tbody.innerHTML = transactions.slice(0, 100).map(tx => {
                let statusClass = 'pending';
                let statusText = '處理中';
                if (tx.status === 'success') {
                    statusClass = 'success';
                    statusText = '成功';
                } else if (tx.status === 'failed') {
                    statusClass = 'failed';
                    statusText = '失敗';
                }
                
                const driverInfo = tx.driverCode ? 
                    `<span style="display:inline-flex;align-items:center;gap:4px;">🚚 ${tx.driverCode}</span>` : 
                    '<span style="color:#999">-</span>';
                
                const note = tx.remark || '';
                
                const orderNoShort = tx.orderNo.length > 15 ? tx.orderNo.substring(0, 12) + '...' : tx.orderNo;
                
                return `
                    <tr>
                        <td style="font-size: 12px; font-family: monospace;" title="${tx.orderNo}">${orderNoShort}</td>
                        <td>${tx.payOrderId || '-'}</td>
                        <td style="white-space: nowrap;">${formatDate(tx.createdAt)}</td>
                        <td class="amount-cell">HK$ ${parseFloat(tx.amount).toFixed(2)}</td>
                        <td>${methodNames[tx.payType] || tx.payType}</td>
                        <td>${driverInfo}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td style="min-width: 150px;">
                            <div class="note-cell" contenteditable="true" 
                                 data-order-no="${tx.orderNo}"
                                 style="min-height: 32px; padding: 6px 10px; border: 1px solid var(--beige); border-radius: 6px; background: var(--cream); cursor: text; font-size: 13px; line-height: 1.4;"
                                 onblur="saveNote(this)"
                                 onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${note}</div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateStats(stats) {
            console.log('updateStats called with:', stats);
            
            const revenueEl = document.getElementById('todayRevenue');
            const countEl = document.getElementById('todayCount');
            const rateEl = document.getElementById('successRate');
            
            if (stats.todayRevenue !== undefined && stats.todayRevenue !== null) {
                const formattedRevenue = parseFloat(stats.todayRevenue).toLocaleString('en-HK', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
                revenueEl.textContent = `HK$ ${formattedRevenue}`;
            }
            if (stats.todayOrders !== undefined && stats.todayOrders !== null) {
                countEl.textContent = stats.todayOrders;
            }
            if (stats.successRate !== undefined && stats.successRate !== null) {
                rateEl.textContent = `${stats.successRate}%`;
            }
        }

        // 篩選功能
        async function filterTransactions() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const status = document.getElementById('statusFilter').value;
            const payType = document.getElementById('payTypeFilter').value;
            const driverCode = document.getElementById('driverFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            try {
                let url = `${API_BASE}/api/v1/${merchantCode}/admin/transactions`;
                const params = [];
                if (startDate) params.push(`startDate=${startDate}`);
                if (endDate) params.push(`endDate=${endDate}`);
                if (status) params.push(`status=${status}`);
                if (payType) params.push(`payType=${payType}`);
                if (driverCode) params.push(`driverCode=${driverCode}`);
                if (params.length > 0) url += '?' + params.join('&');
                
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success && result.data && result.data.transactions) {
                    let transactions = result.data.transactions;
                    
                    // 客戶端搜索
                    if (search) {
                        transactions = transactions.filter(tx => 
                            (tx.orderNo || '').toLowerCase().includes(search) ||
                            (tx.payOrderId || '').toLowerCase().includes(search) ||
                            (tx.driverCode || '').toLowerCase().includes(search)
                        );
                    }
                    
                    renderTransactions(transactions);
                }
            } catch (error) {
                console.error('Error filtering:', error);
            }
        }

        function refreshData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('transactionsTable').style.display = 'none';
            loadTransactions();
        }

        function exportData() {
            // 獲取當前顯示的交易數據並導出為 CSV
            const table = document.getElementById('transactionTable');
            const rows = table.querySelectorAll('tr');
            
            if (rows.length === 0) {
                alert('暫無數據可導出');
                return;
            }
            
            let csv = '訂單號,支付訂單號,時間,金額,支付方式,收款渠道,狀態,備註\n';
            
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 8) {
                    const orderNo = cells[0].textContent;
                    const payOrderId = cells[1].textContent;
                    const time = cells[2].textContent;
                    const amount = cells[3].textContent.replace('HK$ ', '');
                    const payType = cells[4].textContent;
                    const driver = cells[5].textContent.trim().replace('🚚 ', '');
                    const status = cells[6].textContent.trim();
                    const note = cells[7].textContent.trim();
                    csv += `${orderNo},${payOrderId},${time},${amount},${payType},${driver},${status},${note}\n`;
                }
            });
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `kingchicken_transactions_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        function viewDetail(orderNo) {
            alert('訂單詳情：' + orderNo);
        }

        // 格式化日期時間
        function formatDate(timestamp) {
            if (!timestamp) return '-';
            
            // 處理 Unix 時間戳（秒或毫秒）
            let date;
            if (typeof timestamp === 'number' || /^\d+$/.test(timestamp)) {
                const ts = parseInt(timestamp);
                // 判斷是秒還是毫秒
                date = new Date(ts > 10000000000 ? ts : ts * 1000);
            } else {
                date = new Date(timestamp);
            }
            
            if (isNaN(date.getTime())) return timestamp;
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        async function saveNote(element) {
            const orderNo = element.dataset.orderNo;
            const note = element.textContent.trim();
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/${merchantCode}/admin/transactions/${orderNo}/note`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to save note');
                }
                
                // 显示保存成功提示
                element.style.background = 'rgba(22, 163, 74, 0.1)';
                setTimeout(() => {
                    element.style.background = 'var(--cream)';
                }, 500);
                
            } catch (error) {
                console.error('Error saving note:', error);
                alert('保存備註失敗，請重試');
            }
        }

        // 同步 EasyLink 訂單
        async function syncEasyLinkOrders() {
            const syncBtn = document.getElementById('syncBtn');
            const syncResult = document.getElementById('syncResult');
            const syncDate = document.getElementById('syncDate').value;
            
            // 禁用按鈕並顯示加載狀態
            syncBtn.disabled = true;
            syncBtn.textContent = '🔄 同步中...';
            syncResult.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/admin/sync-easylink-orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        date: syncDate || undefined,
                        limit: 50
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    
                    // 顯示同步結果
                    syncResult.style.display = 'block';
                    
                    if (data.total === 0) {
                        syncResult.style.background = 'rgba(217, 119, 6, 0.1)';
                        syncResult.style.border = '1px solid rgba(217, 119, 6, 0.2)';
                        syncResult.style.color = 'var(--warning)';
                        syncResult.innerHTML = `
                            <strong>⚠️ 沒有找到需要同步的訂單</strong><br>
                            <span style="font-size: 13px;">請檢查日期範圍或稍後再試</span>
                        `;
                    } else {
                        const updatedCount = data.details.filter(d => d.statusChanged).length;
                        
                        syncResult.style.background = updatedCount > 0 ? 'rgba(22, 163, 74, 0.1)' : 'rgba(37, 99, 235, 0.1)';
                        syncResult.style.border = updatedCount > 0 ? '1px solid rgba(22, 163, 74, 0.2)' : '1px solid rgba(37, 99, 235, 0.2)';
                        syncResult.style.color = updatedCount > 0 ? 'var(--success)' : 'var(--text-medium)';
                        
                        let detailsHtml = '';
                        if (updatedCount > 0) {
                            const updatedOrders = data.details.filter(d => d.statusChanged);
                            detailsHtml = `
                                <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--beige);">
                                    <strong>已更新訂單：</strong><br>
                                    ${updatedOrders.map(o => `
                                        <span style="font-size: 12px; display: inline-block; margin: 4px 8px 4px 0; padding: 4px 8px; background: var(--cream); border-radius: 4px;">
                                            ${o.orderNo}: ${getStatusText(o.currentStatus)} → ${getStatusText(o.newStatus)}
                                        </span>
                                    `).join('')}
                                </div>
                            `;
                        }
                        
                        // 顯示失敗的訂單
                        const failedOrders = data.details.filter(d => d.error);
                        let failedHtml = '';
                        if (failedOrders.length > 0) {
                            failedHtml = `
                                <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--beige); color: var(--danger);">
                                    <strong>⚠️ 同步失敗 (${failedOrders.length}筆)：</strong><br>
                                    <span style="font-size: 12px;">${failedOrders.map(o => o.orderNo).join(', ')}</span>
                                </div>
                            `;
                        }
                        
                        syncResult.innerHTML = `
                            <strong>${updatedCount > 0 ? '✅ 同步成功！' : '✓ 同步完成'}</strong><br>
                            <span style="font-size: 13px;">
                                總共檢查: ${data.total} 筆訂單 | 
                                已更新: ${updatedCount} 筆 | 
                                失敗: ${failedOrders.length} 筆
                            </span>
                            ${detailsHtml}
                            ${failedHtml}
                        `;
                        
                        // 如果有更新，刷新交易列表
                        if (updatedCount > 0) {
                            setTimeout(() => {
                                refreshData();
                            }, 1500);
                        }
                    }
                } else {
                    throw new Error(result.error || '同步失敗');
                }
                
            } catch (error) {
                console.error('Sync error:', error);
                syncResult.style.display = 'block';
                syncResult.style.background = 'rgba(220, 38, 38, 0.1)';
                syncResult.style.border = '1px solid rgba(220, 38, 38, 0.2)';
                syncResult.style.color = 'var(--danger)';
                syncResult.innerHTML = `
                    <strong>❌ 同步失敗</strong><br>
                    <span style="font-size: 13px;">${error.message || '請檢查網絡連接後重試'}</span>
                `;
            } finally {
                // 恢復按鈕狀態
                syncBtn.disabled = false;
                syncBtn.textContent = '🔄 同步 EasyLink 訂單';
            }
        }

        // 狀態數字轉文字
        function getStatusText(status) {
            const statusMap = {
                0: '生成',
                1: '支付中',
                2: '成功',
                3: '失敗',
                4: '撤銷',
                5: '退款',
                6: '關閉'
            };
            return statusMap[status] || status;
        }

        // 綁定篩選事件
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuth()) return;
            
            initTheme();
            loadTransactions();
            loadStatistics();
            
            // 設置默認日期
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('endDate').value = today;
            const lastWeek = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            document.getElementById('startDate').value = lastWeek;
            
            // 綁定篩選事件
            document.getElementById('startDate').addEventListener('change', debounce(filterTransactions, 300));
            document.getElementById('endDate').addEventListener('change', debounce(filterTransactions, 300));
            document.getElementById('statusFilter').addEventListener('change', debounce(filterTransactions, 300));
            document.getElementById('payTypeFilter').addEventListener('change', debounce(filterTransactions, 300));
            document.getElementById('driverFilter').addEventListener('change', debounce(filterTransactions, 300));
            document.getElementById('searchInput').addEventListener('input', debounce(filterTransactions, 300));
        });
    </script>
</body>
