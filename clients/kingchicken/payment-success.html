<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付成功 - King-Chicken</title>
    <link rel="icon" type="image/png" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --hermes-orange: #FF6B00;
            --hermes-dark: #E55A00;
            --cream: #FAF7F2;
            --cream-dark: #F5F0E8;
            --beige: #EDE8E0;
            --text-dark: #2C2419;
            --text-medium: #5C4F3D;
            --text-light: #8B7D6B;
            --white: #FFFFFF;
            --gold: #C9A961;
            --success: #16a34a;
        }

        body {
            font-family: Arial, 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--beige) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .success-container {
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 20px 60px -15px rgba(44, 36, 25, 0.15);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            border: 1px solid rgba(201, 169, 97, 0.2);
            text-align: center;
        }

        .header {
            background: linear-gradient(135deg, var(--cream-dark) 0%, var(--beige) 100%);
            padding: 40px 32px;
            border-bottom: 3px solid var(--hermes-orange);
        }

        .logo img {
            height: 60px;
            width: auto;
            margin-bottom: 16px;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--success), #15803d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 50px;
            color: white;
            box-shadow: 0 8px 24px rgba(22, 163, 74, 0.3);
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .success-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--success);
            margin-bottom: 8px;
        }

        .success-subtitle {
            font-size: 14px;
            color: var(--text-light);
        }

        .content {
            padding: 32px;
        }

        .order-info {
            background: var(--cream);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .info-row:last-child {
            margin-bottom: 0;
            padding-top: 16px;
            border-top: 1px solid var(--beige);
        }

        .info-label {
            color: var(--text-light);
        }

        .info-value {
            color: var(--text-dark);
            font-weight: 500;
        }

        .info-value.amount {
            color: var(--hermes-orange);
            font-size: 20px;
            font-weight: 600;
        }

        .info-value.success {
            color: var(--success);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--hermes-orange), var(--hermes-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
            margin-bottom: 12px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 0, 0.4);
        }

        .btn-secondary {
            background: var(--cream);
            color: var(--text-medium);
            border: 1px solid var(--beige);
        }

        .btn-secondary:hover {
            background: var(--beige);
        }

        .footer {
            padding: 20px;
            border-top: 1px solid var(--beige);
            font-size: 12px;
            color: var(--text-light);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--beige);
            border-top-color: var(--hermes-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .success-container {
                border-radius: 0;
                min-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <!-- 加載狀態 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: var(--text-medium);">正在確認支付狀態...</p>
        </div>

        <!-- 成功內容 -->
        <div id="successContent">
            <div class="header">
                <div class="logo">
                    <img src="logo-kc.png" alt="King-Chicken" onerror="this.style.display='none'">
                </div>
                <div class="success-icon">✓</div>
                <h1 class="success-title">支付成功！</h1>
                <p class="success-subtitle">感謝您的付款，訂單已確認</p>
            </div>
            
            <div class="content">
                <div class="order-info">
                    <div class="info-row">
                        <span class="info-label">訂單編號</span>
                        <span class="info-value" id="orderNo">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">支付方式</span>
                        <span class="info-value" id="payType">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">支付時間</span>
                        <span class="info-value" id="payTime">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">支付金額</span>
                        <span class="info-value amount" id="amount">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">支付狀態</span>
                        <span class="info-value success">✓ 支付成功</span>
                    </div>
                </div>
                
                <a href="./" class="btn btn-primary">
                    🏠 返回首頁
                </a>
                <button class="btn btn-secondary" onclick="viewOrderDetail()">
                    🧾 查看訂單詳情
                </button>
            </div>
            
            <div class="footer">
                如有疑問，請聯繫客服<br>
                King-Chicken 支付系統
            </div>
        </div>
    </div>

    <script>
        // 解析 URL 參數
        const urlParams = new URLSearchParams(window.location.search);
        
        // 獲取訂單信息
        const orderNo = urlParams.get('mchOrderNo') || urlParams.get('orderNo') || '-';
        const amount = urlParams.get('amount');
        const wayCode = urlParams.get('wayCode') || '';
        const successTime = urlParams.get('successTime');
        const payOrderId = urlParams.get('payOrderId') || '-';
        
        // 顯示訂單信息
        document.getElementById('orderNo').textContent = orderNo;
        
        // 支付方式名稱映射
        const payTypeNames = {
            'UP_OP': '銀聯在線支付',
            'ALI_H5': '支付寶',
            'WX_H5': '微信支付'
        };
        document.getElementById('payType').textContent = payTypeNames[wayCode] || wayCode || '-';
        
        // 格式化金額
        if (amount) {
            const formattedAmount = (parseFloat(amount) / 100).toLocaleString('zh-HK', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            document.getElementById('amount').textContent = `HK$ ${formattedAmount}`;
        } else {
            document.getElementById('amount').textContent = '-';
        }
        
        // 格式化時間
        if (successTime) {
            const date = new Date(parseInt(successTime));
            document.getElementById('payTime').textContent = date.toLocaleString('zh-HK', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        } else {
            document.getElementById('payTime').textContent = new Date().toLocaleString('zh-HK');
        }
        
        // 查看訂單詳情
        function viewOrderDetail() {
            alert(`訂單詳情：\n\n訂單號：${orderNo}\n支付訂單號：${payOrderId}\n\n您可以在管理後台查看完整詳情。`);
        }
        
        // 可選：自動查詢訂單狀態確認
        async function verifyPayment() {
            try {
                // 如果 URL 中沒有完整參數，可以調用 API 查詢
                if (orderNo && orderNo !== '-') {
                    console.log('Payment verified for order:', orderNo);
                }
            } catch (error) {
                console.error('Verification error:', error);
            }
        }
        
        // 頁面加載完成後執行
        document.addEventListener('DOMContentLoaded', verifyPayment);
    </script>
</body>
</html>
